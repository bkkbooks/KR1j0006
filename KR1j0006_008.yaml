body:
  text: 第八輶軒使者絶代語釋別國方言第八虎陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳或謂之於䖘自關東西或謂之伯都貔陳楚江淮之間謂之𧳟北燕朝鮮之間謂之𧳏關西謂之狸貛關西謂之貒雞陳楚宋魏之間謂之鸊𪀍桂林之中謂之割雞或曰𩀨北燕朝鮮洌水之間謂伏雞曰抱爵子及雞雛皆謂之𪆪其卯伏而未孚始化謂之涅豬北燕朝鮮之間謂之豭關東西或謂之彘或謂之豕南楚謂之豨其子或謂之豚或謂之貕吳揚之間謂之豬子其檻及蓐曰橧布穀自關東西梁楚之間謂之結誥周魏之間謂之擊穀自關而西或謂之布穀䳚鴠周魏齊宋楚之間謂之定甲或謂之獨舂自關而東謂之城旦或謂之倒懸或謂之鴠鴠自關而西秦隴之內謂之鶡鴠鳩自關而東周鄭之郊韓魏之都謂之鷱其𪁛鳩謂之鸊鷱自關而西秦漢之間謂之鳩其大者謂之鳻鳩其小者謂之𪁛鳩或謂䳫鳩或謂之䳕鳩或謂之鶻鳩梁宋之間謂之鷦䲩尸鳩燕之東北朝鮮洌水之間謂之鶝䲹自關而東謂之戴鵀東齊海岱之間謂之戴南南猶鵀也或謂之鶭鸅或謂之戴鳻或謂之戴勝東齊吳揚之間謂之鵀自關而西謂之服鶝或謂之𪃃鶝燕之東北朝鮮洌水之間謂之𪂉蝙蝠自關而東謂之服翼或謂之飛鼠或謂之老鼠或謂之𥂖鼠自關而西秦隴之間謂之蝙蝠北燕謂之蟙䘃鴈自關而東謂之鴚鵝南楚之外謂之鵝或謂之鶬鴚桑飛自關而東謂之工爵或謂之過鸁或謂之女𪀘自關而東謂之鸋鴂自關而西謂之桑飛或謂之懱爵𪈳黃自關而東謂之創鶊自關而西謂之𪈳黃或謂之黃鳥或謂之楚雀野鳧其小而好沒水中者南楚之外謂之鸊鷉大者謂之鶻蹄守宮秦晉西夏謂之守宮或謂之蠦𧔊或謂之蜤易其在澤中者謂之易蜴南楚謂之蛇醫或謂之蠑螈東齊海岱謂之螔䗔北燕謂之祝蜓桂林之中守宮大者而能鳴謂之蛤解宛野謂鼠為𪕪雞雛徐魯之間謂之秋侯子
