body:
  text: 第十輶軒使者絶代語釋別國方言第十媱愓遊也江沅之間謂戲為媱或謂之愓或謂之嬉曾訾何也湘潭之原荊之南鄙謂何為曾或謂之訾若中夏言何為也央亡嚜杘姡獪也江湘之間或謂之無賴或謂之㺒凡小兒多詐而獪謂之央亡或謂之嚜杘或謂之姡姡娗也或謂之猾皆通語也崽者子也湘沅之會凡言是子者謂之崽若東齊言子矣誺不知也沅澧之間凡相問而不知答曰誺使之而不肯答曰吂粃不知也㷄火也楚轉語也猶齊言𤈦火也嘳無寫憐也沅灃之原凡言相憐哀謂之嘳或謂之無寫江濱謂之思皆相見歡喜有得亡之意也九嶷湘潭之間謂之人兮婩嫧鮮好也南楚之外通語也㘓哰謰嘍拏也東齊周晉之鄙曰㘓哰㘓哰亦通語也南楚曰謰嘍或謂之支注或謂之詀謕轉語也拏揚州會稽之語也或謂之惹或謂之䛳亄貪也荊汝江湘之郊凡貪而不施謂之亄或謂之或謂之吝吝恨也遙窕淫也九嶷荊郊之鄙謂淫曰遙沅湘之間謂之窕潛涵沉也楚郢以南曰涵或曰潛潛又遊也𡧘安靜也江湘九嶷之郊謂之𡧘拌棄也楚凡揮棄物謂之拌或謂之敲淮汝之間謂之伇諑訴也楚以南謂之諑戲泄歇也楚謂之戲泄奄息也楚揚謂之泄攓取也楚謂之攓昲曬乾物也揚楚通語也䕁猝也江湘之間凡卒相見謂之䕁相見或曰突迹迹屑屑不安也江沅之間謂之迹迹秦晉謂之屑屑或謂之塞塞或謂之省省不安之語也𤄎沐佂伀遑遽也江湘之間凡窘猝怖遽謂之𤄎沐或謂之佂伀翥舉也楚謂之翥忸怩慚歰也楚郢江湘之間謂之忸怩或謂之㗤咨垤封場也楚郢以南蟻土謂之垤垤中齊語也謫過也南楚以南凡相非議人謂之謫或謂之衇衇又慧也兄也荊揚之鄙謂之桂林之中謂之𧬯極吃也楚語也或謂之軋或謂之歰啙矲短也江湘之會謂之啙凡物生而不長大亦謂之鮆又曰𤸾桂林之中謂短矲矲通語也東陽之間謂之㾈鉗㽹憋惡也南楚凡人殘罵謂之鉗又謂之㽹癡騃也揚越之郊凡人相侮以為無知謂之眲眲耳目不相信也或謂之斫惃𢠜頓愍惛也楚揚謂之惃或謂之𢠜江湘之間謂之頓愍或謂之氐惆南楚飲毒藥悶謂之氐惆亦謂之頓愍猶中齊言眠眩也愁恚憒憒毒而不發謂之氐惆悅舒蘇也楚通語也眠娗脈蜴賜施茭媞譠謾㦒忚皆欺謾之語也楚郢以南東揚之郊通語也𩔣額顏顙也湘江之間謂之𩔣中夏之謂額東齊謂之顙汝潁淮泗之間謂之顏頷頤頜也南楚謂之頷秦晉謂之頜頤其通語也紛怡喜也湘潭之間曰紛怡或曰巸巳𣵷或也沅澧之間凡言或如此者曰𣵷如是愮療治也江湘郊會謂醫治之曰愮愮又憂也或曰療卉莽草也東越揚州之間曰卉南楚曰莽悈鰓乾都耇革老也皆南楚江湘之間代語也㧙抌推也南楚凡相推搏曰㧙或曰㧾沅湧𣹋幽之語或曰攩食閻慫慂勸也南楚凡己不欲喜而旁人說之不欲怒而旁人怒之謂之食閻或謂之慫涌欸𧫦然也南楚凡言然者曰欸或曰𧫦緤末紀緒也南楚皆曰緤或曰端或曰紀或曰末皆楚轉語也䁓𣛒窺坥占伺視也凡相竊視南楚謂之窺或謂之䁓或謂之坥或謂之占或謂之𣛒𣛒中夏語也窺其通語也自江而北謂之坥或謂之覗凡相候謂之占占猶瞻也郺𨑊晠多也南楚凡大而多謂之郺或謂之𨑊凡人語言過度及妄施行亦謂之𨑊抯摣取也南楚之間凡取物溝泥中謂之柤或謂之樝𠆩僄輕也楚凡相輕薄謂之相𠆩或謂之僄也
