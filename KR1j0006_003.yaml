body:
  text: 第三輶軒使者絶代語釋別國方言第三陳楚之間凡人嘼乳而雙産謂之釐孳秦晉之間謂之僆子自關而東趙魏之間謂之孿生女謂之嫁子東齊之間壻謂之倩燕齊之間養馬者謂之娠官婢女廝謂之娠楚東海之間亭父謂之亭公卒謂之弩父或謂之褚臧甬侮獲奴婢賤稱也荊淮海岱雜齊之間罵奴曰臧罵婢曰獲齊之北鄙燕之北郊凡民男而壻婢謂之臧女而婦奴謂之獲亡奴謂之臧亡婢謂之獲皆異方罵奴婢之醜稱也自關而東陳魏宋楚之間保庸謂之甬秦晉之間罵奴婢曰侮蒍訛譁涅化也燕朝鮮洌水之間曰涅或曰譁雞伏卵而未孚始化之時謂之涅斟協汁也北燕朝鮮洌水之間曰斟自關而東曰協關西曰汁蘇芥草也江淮南楚之間曰蘇自關而西或曰草或曰芥南楚江湘之間謂之芥蘇亦荏也關之東西或謂之蘇或謂之荏周鄭之間謂之公蕡沅湘之南或謂之𦵯其小者謂之䖆葇蘴蕘蕪菁也陳楚之郊謂之蘴魯齊之郊謂之蕘關之東西謂之蕪菁趙魏之郊謂之大芥其小者謂之辛芥或謂之幽芥其紫華者謂之蘆蔔東魯謂之菈𦾽葰芡雞頭也北燕謂之葰青徐淮泗之間謂之芡南楚江湘之間謂之雞頭或謂之鴈頭或謂之烏頭凡草木刺人北燕朝鮮之間謂之茦或謂之壯自關而東或謂之梗或謂之劌自關而西謂之刺江湘之間謂之棘凡飲藥傅藥而毒南楚之外謂之瘌北燕朝鮮之間謂之癆東齊海岱之間謂之眠或謂之眩自關而西謂之毒瘌痛也逞曉恔苦快也自關而東或曰曉或曰逞江淮陳楚之間曰逞宋鄭周洛韓魏之間曰苦東齊海岱之間曰恔自關而西曰快膠譎詐也涼州西南之間曰膠自關而東西或曰譎或曰膠詐通語也揠擢拂戎拔也自關而西或曰拔或曰擢自關而東江淮南楚之間或曰戎東齊海岱之間曰揠慰廛度凥也江淮青徐之間曰慰東齊海岱之間或曰度或曰廛或曰踐萃雜集也東齊曰聖逮遝及也東齊曰逮關之東西曰遝或曰及荄杜根也東齊曰杜或曰茇班徹列也北燕曰班東齊曰徹瘼癁病也東齊海岱之間曰瘼或曰癁秦曰瘎掩醜掍綷同也江淮南楚之間曰掩宋衛之間曰綷或曰掍東齊曰醜裕猷道也東齊曰裕或曰猷虔散殺也東齊曰散青徐淮楚之間曰虔泛浼㶄窪汙也自關而東或曰窪或曰泛東齊海岱之間或曰浼或曰㶄庸恣比侹更佚代也齊曰佚江淮陳楚之間曰侹餘四方之通語也氓民也𣏒仇也寓寄也露敗也別治也棖法也謫怒也間非也格正也數也軫戾也屑潔也諄罪也俚聊也梱就也苙圂也廋隱也銛取也棖隨也儓𧟱農夫之醜稱也南楚凡罵庸賤謂之田儓或謂之𧟱或謂之辟辟商人醜稱也庸謂之倯轉語也褸裂須捷挾斯敗也南楚凡人貧衣被醜弊謂之須捷或謂之褸裂或謂之襤褸故左傳曰蓽路襤褸以啓山林殆謂此也或謂之挾斯器物弊亦謂之挾斯撲鋌澌盡也南楚凡物盡生者曰撲生物空盡者曰鋌鋌賜也連此撲斯皆盡也鋌空也語之轉也撲翕葉聚也楚謂之撲或謂之翕葉楚通語也斟益也南楚凡相益而又少謂之不斟凡病少愈而加劇亦謂之不斟或謂之何斟差間知愈也南楚病愈者謂之差或謂之間或謂之知知通語也或謂之慧或謂之憭或謂之瘳或謂之蠲或謂之除
