body:
  text: 第二輶軒使者絶代語釋別國方言第二釥嫽好也青徐海岱之間曰釥或謂之嫽好凡通語也朦厖豐也自關而西秦晉之間凡大貌謂之朦或謂之厖豐其通語也趙魏之郊燕之北鄙凡大人謂之豐人燕記曰豐人杼首杼首長首也楚謂之妤燕謂之杼燕趙之間言圍大謂之豐娃嫷窕豔美也吳楚衡淮之間曰娃南楚之外曰嫷宋衛晉鄭之間曰豔陳楚周南之間曰窕自關而西秦晉之間凡美色或謂之好或謂之窕故吳有館娃之宮秦有娥之臺秦晉之間美貌謂之娥美狀為窕美色為豔美心為窈奕偞容也自關而西凡美容謂之奕或謂之偞宋衛曰偞陳楚汝潁之間謂之奕䫵鑠盱揚𥉋隻也南楚江淮之間曰䫵或曰𥉋好目謂之順黸瞳之子謂之𥌣宋衛韓鄭之間曰鑠燕代朝鮮洌水之間曰盱或謂之揚魏笙揫摻細也自關而西秦晉之間凡細而有容謂之魏或曰徥凡細貌謂之笙斂物而細謂之揫或曰摻傀渾䑄䑋𠐋泡盛也自關而西秦晉之間語也陳宋之間曰𠐋江淮之間曰泡秦晉或曰䑋梁益之間凡人言盛及其所愛曰偉其肥𦟠謂之䑋私策纖䓲稚杪小也自關而西秦晉之郊梁益之間凡物小者謂之私小或曰纖繒帛之細者謂之纖東齊言布帛之細者曰綾秦晉曰靡凡草生而初達謂之䓲稚年小也木細枝謂之杪江淮陳楚之內謂之篾青齊兗冀之間謂之葼燕之北鄙朝鮮洌水之間謂之策故傳曰慈母之怒子也雖折葼笞之其惠存焉殗殜微也宋衛之間曰殗自關而西秦晉之間凡病而不甚曰殗殜臺敵延也東齊海岱之間曰臺自關而西秦晉之間物力同者謂之臺敵抱㛯耦也荊吳江湖之間曰抱㛯宋潁之間或曰㛯倚踦奇也自關而西秦晉之間凡全物而體不具謂之倚梁楚之間謂之踦雍梁之西郊凡嘼支體不具者謂之踦逴獡透驚也自關而西秦晉之間凡蹇者或謂之逴體而偏長短亦謂之逴宋衛南楚凡相驚曰獡或曰透儀𢓜來也陳潁之間曰儀自關而東周鄭之郊齊魯之間或謂𢓜曰懷䵒暗攝黏也齊魯青徐自關而東或曰䵒或曰攝糊託庇寓媵寄也齊衛宋魯陳晉汝潁荊州江淮之間曰庇或曰寓寄食為糊凡寄為託寄物為媵逞苦了快也自山而東或曰逞楚曰苦秦曰了挴㥾赧愧也晉曰挴或曰㥾秦晉之間凡愧而見上謂之赧梁宋曰㥾叨婪殘也陳楚曰婪憑𪗮苛怒也楚曰憑小怒曰𪗮陳謂之苛憡剌痛也自關而西秦晉之間或曰憡嬌捎選也自關而西秦晉之間凡取物之上謂之嬌捎𢵧梗爽猛也晉魏之間曰𢵧韓趙之間曰梗齊晉曰爽瞷睇睎䀩眄也陳楚之間南楚之外曰睇東齊青徐之間曰睎吳揚江淮之間或曰瞷或曰䀩自關而西秦晉之間曰眄䭒喙呬息也周鄭宋沛之間曰䭒自關而西秦晉之間或曰喙或曰䭒東齊曰呬䤨裁也梁益之間裁木為器曰䤨裂帛為衣曰䤨又斫也晉趙之間謂之䤨䤨鐫㧻也晉趙謂之鐫鍇鑙堅也自關而西秦晉之間曰鍇吳揚江淮之間曰鑙揄鋪𢅡𢃀帗縷葉輸毳也荊揚江湖之間曰揄鋪楚曰𢅡𢃀陳宋鄭衛之間謂之帗縷燕之北郊朝鮮洌水之間曰葉輸孑藎餘也周鄭之間曰藎或曰孑青徐楚之間曰孑自關而西秦晉之間炊薪不盡曰藎孑俊也遵俊也翿幢翳也楚曰翿關西關東皆曰幢搜略求也秦晉之間曰搜就室曰搜於道曰略略強取也攗托取也此通語也茫矜奄遽也吳揚曰茫陳潁之間曰奄秦晉或曰矜或曰遽速逞搖扇疾也東齊海岱之間曰速燕之外鄙朝鮮洌水之間曰搖扇楚曰逞豫賴讎也南楚之外曰賴秦晉曰讎恆慨蔘綏羞繹紛母言既廣又大也荊揚之間凡言廣大者謂之恆慨東甌之間謂之蔘綏或謂之羞繹紛母劋蹶獪也秦晉之間曰獪楚謂之劋或曰蹶楚鄭曰蒍或曰姡
