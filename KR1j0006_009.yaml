body:
  text: 第九輶軒使者絶代語釋別國方言第九戟楚謂之釨凡戟而無刃秦晉之間謂之釨或謂之鏔吳揚之間謂之戈東齊秦晉之間謂其大者曰鏝胡其曲者謂之鉤釨鏝胡三刃枝南楚宛郢謂之匽戟其柄自關而西謂之柲或謂之殳矛吳揚江淮南楚五湖之間謂之鍦或謂之鋋或謂之鏦其柄謂之矜箭自關而東謂之矢江淮之間謂之鍭關西曰箭鑽謂之鍴矜謂之杖劍削自河而北燕趙之間謂之窒自關而東或謂之廊或謂之削自關而西謂之𩏂盾自關而東或謂之瞂或謂之干關西謂之盾車下鐵陳宋淮楚之間謂之畢大車謂之綦車䡺齊謂之𨏠車枸簍宋魏陳楚之間謂之簂或謂之𥳎籠其上約謂之𥭖或謂之䈿秦晉之間自關而西謂之枸簍西隴謂之軬南楚之外謂之篷或謂之隆屈輪韓楚之間謂之軑或謂之軝關西謂之𨍈輑謂之軸轅楚衛之間謂之輈箱謂之輫軫謂之枕車紂自關而東周洛韓鄭汝潁而東謂之緧或謂之曲綯或謂之曲綸自關而西謂之紂輨軑鍊𨬍關之東西曰輨南楚曰軑趙魏之間曰鍊𨬍車釭齊燕海岱之間謂之鍋或謂之錕自關而西謂之釭盛膏者乃謂之鍋凡箭鏃胡合嬴者四鐮或曰拘腸三鐮者謂之羊頭其廣長而薄鐮謂之錍或謂之耙箭其小而長中穿二孔者謂之鉀爐其三鐮長尺六者謂之飛虻者謂之平題所以藏箭弩謂之箙弓謂之鞬或謂之皾凡矛骹細如鴈脛者謂之鶴膝有小枝刃者謂之鉤釨矛或謂之釨錟謂之鈹骹謂之銎鐏謂之釬舟自關而西謂之船自關而東或謂之舟或謂之航南楚江湘凡船大者謂之舸小舸謂之艖艖謂之艒䑿小艒䑿謂之艇艇長而薄者謂之艜短而深者謂之䒀小而深者謂之舼東南丹陽會稽之間謂艖為欚泭謂之椑椑謂之筏筏秦晉之通語也江淮家居椑中謂之薦方舟謂之㶇艁舟謂之浮梁楫謂之橈或謂之棹所以隱棹謂之槳所以縣樛謂之緝所以刺船謂之篙維之謂之鼎首謂之閣閭或謂之艗艏後曰舳舳制水也偽謂之仡仡不安也
