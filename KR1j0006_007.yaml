body:
  text: 第七輶軒使者絕代語釋別國方言第七諄憎所疾也宋魯凡相惡謂之諄憎若秦晉言可惡矣杜蹻歰也趙曰杜山之東西或曰蹻佻抗縣也趙魏之間曰佻自山之東西曰抗燕趙之郊縣物於臺之上謂之佻發稅舍車也東齊海岱之間謂之發宋趙陳魏之間謂之稅肖類法也齊曰類西楚梁益之間曰肖秦晉之西鄙自冀隴而西使犬曰哨西南梁益之間凡言相類者亦謂之肖憎懹憚也陳曰懹譙讙讓也齊楚宋衛荊陳之間曰譙自關而西秦晉之間凡言相責讓曰譙讓北燕曰讙僉胥皆也自山而東五國之郊曰僉東齊曰胥侔莫強也北燕之外郊凡勞而相勉若言努力者謂之侔莫𠌖倯罵也燕之北郊曰𠌖倯展惇信也東齊海岱之間曰展燕曰惇斯掬離也齊陳曰斯燕之外郊朝鮮洌水之間曰掬蝎噬逮也東齊曰蝎北燕曰噬逮通語也皮𠌽彈憸強也秦晉言非其事謂之皮𠌽東齊陳宋江淮之間曰彈憸曬晞㬥也東齊及秦之西鄙言相㬥僇為燕之外郊朝鮮洌水之間凡㬥肉發人之私披牛羊之五藏謂之㬥五穀之類秦晉之間謂之曬東齊北燕海岱之郊謂之晞熬焣煎㷶鞏火乾也凡以火而乾五穀之類自山而東齊楚以往謂之熬關西隴冀以往謂之㷶秦晉之間或謂之焣凡有汁而乾謂之煎東齊謂之鞏胹飪亨爛糦酋酷熟也自關而西秦晉之郊曰胹徐揚之間曰飪嵩嶽以南陳潁之間曰亨自河以北趙魏之間火熟曰爛氣熟曰糦久熟曰酋穀熟曰酷熟其通語也魏盈怒也燕之外郊朝鮮洌水之間凡言呵叱者謂之魏盈䠆𨂣隑企立也東齊海岱北燕之郊跪謂之䠆𨂣委痿謂之隑企瀧涿謂之霑𣿙希鑠摩也燕齊摩鋁謂之希平均賦也燕之北鄙東齊北郊凡相賦斂謂之平均羅謂之離離謂之羅釗超遠也燕之北郊曰釗東齊曰超漢漫䀼眩懣也朝鮮洌水之間煩懣謂之漢漫顛眴謂之䀼眩憐職愛也言相愛憐者吳越之間謂之憐職茹食也吳越之間凡貪飲食者謂之茹竘貌治也吳越飾貌為竘或謂之巧煦煆熱也乾也吳越曰煦煆攍膂賀𦩫儋也齊楚陳宋之間曰攍燕之外郊越之垂甌吳之外鄙謂之膂南楚或謂之攍自關而西隴冀以往謂之賀凡以驢馬馲駝載物者謂之負他亦謂之賀樹植立也燕之外郊朝鮮洌水之間凡言置立者謂之樹植過度謂之涉濟福祿謂之祓戩傺眙逗也南楚謂之傺西秦謂之眙逗其通語也
