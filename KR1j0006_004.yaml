body:
  text: 第四輶軒使者絕代語釋別國方言第四襌衣江淮南楚之間謂之褋關之東西謂之襌衣有袌者趙魏之間謂之袏衣無袌者謂之裎衣古謂之深衣襜褕江淮南楚謂之𧝎褣自關而西謂之襜褕其短者謂之裋褕以布而無緣敝而紩之謂之襤褸自關而西謂之䘪䘿其敝者謂之緻汗襦江淮南楚之間謂之䙢自關而西或謂之衹裯自關而東謂之甲襦陳魏宋楚之間謂之襜襦或謂之襌襦帬陳魏之間謂之帔自關而東或謂之襬蔽䣛江淮之間謂之褘或謂之袚魏宋南楚之間謂之大巾自關東西謂之蔽䣛齊魯之郊謂之袡襦西南屬漢謂之曲領或謂之襦褌陳楚江淮之間謂之䘴袴齊魯之間謂之䙭或謂之襱關西謂之袴褕謂之袖衱謂之褗袿謂之裾褸謂之衽褸謂之緻裯謂之襤無緣之衣謂之襤無袂衣謂之䙃無𧙥之袴謂之襣䘯謂之𧙖衿謂之交裺謂之襦襜謂之䘸佩紟謂之裎褸謂之𧙖覆䘹謂之襌衣偏裨謂之襌𧘑繵謂之褌袒飾謂之直衿襃明謂之袍繞衿謂之帬懸裺謂之緣絜襦謂之蔽膝裪𧝃謂之袖帍裱謂之被巾繞䋸謂之𧞶裺厲謂之帶襎裷謂之幭繄袼謂之䙔楚謂無緣之衣曰襤紩衣謂之褸秦謂之緻自關而西秦晉之間無緣之衣謂之䘪䘿複㮳江湘之間謂之𧞫或謂之筩褹大袴謂之倒頓小袴謂之䘨𧘈楚通語也𣘘巾也大巾謂之𢁥嵩嶽之南陳潁之間謂之帤亦謂之𣘘絡頭帞頭也紗繢䰎帶䰂帶𢂺籆幧頭也自關以西秦晉之郊曰絡頭南楚江湘之間曰帞頭自河以北趙魏之間曰幧頭或謂之𢂺或謂之籆其遍者謂之䰎帶或謂之䰂帶覆結謂之幘巾或謂承露或謂之覆䰂皆趙魏之間通語也屝屨麤履也徐兗之郊謂之屝自關而西謂之屨中有木者謂之複舄自關而東複履其庳者謂之𩊁下襌者謂之鞮絲作之者謂之履麻作之者謂之不借粗者謂之𡲾東北朝鮮洌水之間謂之䩕角南楚江沔之間揔謂之麤西南梁益之間或謂之𡲾或謂之䋀履其通語也徐土邳圻之間大麤謂之䩕角緉𦄍絞也關之東西或謂之緉或謂之𦄍絞通語也纑謂之縝
