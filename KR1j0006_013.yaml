body:
  text: 第十三輶軒使者絶代語釋別國方言第十三裔歷相也裔旅末也𤽊緣廢也純毣好也藐素廣也藐漸也躍拯拔也出溺為拯出火為躍也炖焃煓𦮰貌也憤竅厄也杪眇小也讟咎謗也𨆪敕戒備也摵㨖到也聲腆忘也黮私也龕喊𠸹唏聲也筡箄析也析竹謂之筡𠐽宵使也蠢作也忽達芒也芒濟滅也𠠎劙解也魏能也刻也聳悚也跌蹶也蘪蕪也漫淹敗也溼敝為漫水敝為淹釐挴貪也𢹃挻竟也譴喘轉也困胎㒓逃也隋毻易也朓説好也憚怛惡也吳大也灼驚也賦動也𤸁極也煎盡也爽過也蟬毒也慘㥢也㥢惡也還積也宛蓄也類法也翭本也懼病也驚也藥薄也𣎓短也掊深也湟溺也撈取也膜撫也由式也猷詐也䒰隨也揣試也𢉘怒也埝下也讚解也賴取也扲業也帶行也漮空也湛安也㗔樂也倇歡也衎定也䑄𦞜也讟痛也鼻始也嘼之初生謂之鼻人之初生謂之首梁益之間謂鼻為初或謂之祖祖居也兗養也翳掩也臺支也純文也祐亂也恌理也薀晠也搪張也惲謀也陶養也擒挌也毗曉明也扱擭也扶護也淬寒也漺淨也漉極也牧凡也易始也逭周也䵱色也恬靜也禔福也禔喜也攋隓壞也息歸也抑安也潛亡也曉過也曉嬴也㑁短也隑崎也迒長也迒迹也賦臧也蘊饒也芬和也搗依也依祿也𦛙腯也盬雜猝也躍行也盬且也抽讀也媵託也適牾也捭豫也彌縫也譯傳也譯見也梗略也臆滿也䧞益也空待也珇好也珇美也嫗色也閻開也靡滅也菲薄也腆厚也媟狎也芋大也煬翕炙也煬烈暴也馺馬馳也選延偏也澌索也晞燥也梗覺也萃集也睨䁺明也暟臨昭也暟美也箄簍籅䈱𥱿也江沔之間謂之籅趙代之間謂之䈱淇衛之間謂之井筐𥱿其通語也𥱿小者南楚謂之簍自關而西秦晉之間謂之箄籠南楚江沔之間謂之篣或謂之笯𥰠南楚謂之筲趙魏之郊謂之去𥰠錐謂之鍣無升謂之刁斗匕謂之匙盂謂之㯸河濟之間謂之䀂𥂫碗謂之䀉盂謂之銚鋭木謂之涓抉餌謂之糕或謂之粢或謂之𩚹或謂之餣或謂之䬧餅謂之飥或謂之餦餛餳謂之餦鍠飴謂之䬵豌謂之䭉餳謂之糖凡飴謂之餳自關而東陳楚宋衛之通語也𪍢䴭䴳牟䴽䤓䴹麴也自關而西秦豳之間曰𪍢晉之舊都曰䴭齊右河濟曰䴳或曰牟北鄙曰䴽麴其通語也屋梠謂之櫺甍謂之㽌冢秦晉之間謂之墳或謂之培或謂之堬或謂之采或謂之埌或謂之壠自關而東謂之丘小者謂之塿大者謂之丘凡葬而無墳謂之墓所以墓謂之墲
