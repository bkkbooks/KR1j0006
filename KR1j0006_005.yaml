body:
  text: 第五輶軒使者絶代語釋別國方言第五鍑北燕朝鮮洌水之間或謂之錪或謂之鉼江淮陳楚之間謂之錡或謂之鏤吳揚之間謂之鬲釜自關而西或謂之釜或謂之鍑甑自關而東謂之甗或謂之鬵或謂之酢餾盂宋楚魏之間或謂之碗碗謂之盂或謂之銚鋭碗謂之櫂盂謂之柯海岱東齊北燕之間或謂之𥁠㿿緘盞䀀閜𥂸𥂓杯也秦晉之郊謂之㿿自關而東趙魏之間曰緘或曰盞或曰䀀其大者謂之閜吳越之間曰𥂸齊右平原以東或謂之𥂓杯其通語也瓥陳楚宋魏之間或謂之簞或謂之𣟵或謂之瓢案陳楚宋魏之間謂之𣞐自關東西謂之案杯𥯛陳楚宋衛之間謂之杯𥯛又謂之豆筥自關東西謂之杯𥯛箸筒陳楚宋魏之間謂之筲或謂之籝自關而西謂之桶檧瓬瓭𤮢䍃㽀㼻甀瓮瓿甊㽈罌靈桂之郊謂之㼚其小者謂之瓭周魏之間謂之𤮢秦之舊都謂之㽀淮汝之間謂之䍃江湘之間謂之㼻自關而西晉之舊都河汾之間其大者謂之甀其中者謂之瓿甊自關而東趙魏之郊謂之瓮或謂之罌東齊海岱之間謂之㽈罌其通語也罃陳魏宋楚之間曰㼶或曰㼡燕之東北朝鮮洌水之間謂之瓺齊之東北海岱之間謂之儋周洛韓鄭之間謂之甀或謂之罃罃謂之㼰𦉨謂之㽄缶謂之瓿㼴其小者謂之瓶罃甈謂之盎自關而西或謂之盆或謂之盎其小者謂之升甌甂陳魏宋楚之間謂之㼵自關而西謂之甂其大者謂之甌所以注斛陳魏宋楚之間謂之䈪自關而西謂之注箕陳魏宋楚之間謂之籮炊䉛謂之縮或謂之𥰞或謂之𠤰篝陳楚宋魏之間謂之牆居扇自關而東謂之箑自關而西謂之扇碓機陳魏宋楚自關而東謂之梴磑或謂之䃀繘自關而東周洛韓魏之間謂之綆或謂之絡關西謂之繘綆櫪梁宋齊楚北燕之間或謂之樎或謂之皂飲馬橐自關而西謂之裺囊或謂之裺篼或謂之㡞篼燕齊之間謂之帪鉤宋楚陳魏之間謂之鹿觡或謂之鉤格自關而西謂之鉤或謂之䥩臿燕之東北朝鮮洌水之間謂之𣂁宋魏之間謂之鏵或謂之鍏江淮南楚之間謂之臿沅湘之間謂之畚趙魏之間謂之噪東齊謂之梩𣏌宋魏之間謂之渠拿或謂之渠疏僉宋魏之間謂之攝殳或謂之度自關而西謂之棓或謂之拂齊楚江淮之間謂之柍或謂之桲刈鉤江淮陳楚之間謂之鉊或謂之鐹自關而西或謂之鉤或謂之鎌或謂之鍥薄宋魏陳楚江淮之間謂之䒼或謂之麴自關而西謂之薄南楚謂之蓬薄橛燕之東北朝鮮洌水之間謂之椴槌宋魏陳楚江淮之間謂之植自關而西謂之槌齊謂之樣其橫關西曰𢲂宋魏陳楚江淮之間謂之㯂齊部謂之㭙胡以縣㯂關西謂之䌞東齊海岱之間謂之𦇗宋魏陳楚江淮之間謂之繯或謂之環簟宋魏之間謂之笙或謂之籧䒼自關而西謂之簟或謂之䓆其粗者謂之籧篨自關而東或謂之篕掞筕篖自關而東周洛楚魏之間謂之倚佯自關而西謂之筕篖南楚之外謂之篖床齊魯之間謂之簀陳楚之間或謂之笫其杠北燕朝鮮之間謂之樹自關而西秦晉之間謂之杠南楚之間謂之趙東齊海岱之間謂之樺其上板衛之北郊趙魏之間謂之牒或曰牑俎几也西南蜀漢之郊曰杫榻前几江沔之間曰桯趙魏之間謂之椸几其高者謂之虡篗榬也兗豫河濟之間謂之榬絡謂之格繀車趙魏之間謂之轣轆車東齊海岱之間謂之道軌戶鑰自關之東陳楚之間謂之鍵自關之西謂之鑰簙謂之蔽或謂之箘秦晉之間謂之簙吳楚之間或謂之蔽或謂之箭裏或謂之簙毒或謂之卯專或謂之𠥙璇或謂之棊所以投簙謂之枰或謂之廣平所以行棊謂之局或謂之曲道圍棊謂之奕自關而東齊魯之間皆謂之奕
