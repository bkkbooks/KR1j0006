body:
  text: 第十二輶軒使者絕代語釋別國方言第十二爰喛哀也儒輸愚也愋諒知也拊撫疾也菲惄悵也鬱熙長也娋孟姉也築娌匹也娌耦也䃷裔習也躔逡偱也躔歷行也日運為躔月運為逡逭逳轉也逭逳步也㷭虞望也榆楕脫也解輸梲也賦與操也歇涸也潎澂清也逯遡行也墾牧司也墾力也牧飤也監牧察也𡚊始也𡚊化也鋪脾止也攘掩止也幕覆也侗胴狀也疋杪小也屑往勞也屑𢛛獪也效烓明也𣏾將威也媯娗僈也儇虔謾也佻疾也鞅侼強也鞅侼懟也追未隨也僉怚劇也僉夥也夸烝婬也毗顮懣也焭激清也紓退緩也清躡急也杼解也𨆪逞解也柢柲刺也倩荼借也憵朴猝也麋棃老也萃離時也漢䓇怒也䓇發也誇吁然也猜忦恨也艮磑堅也苂𦪶明也怤愉悅也即圍就即半也惙㤕中也薵蒙覆也籌戴也堪輂載也搖祖上也祖搖也祖轉也括關閉也衝俶動也羞厲熟也厲今也備該咸也噬食也噬憂也𢜽悸也虜鈔強也鹵奪也鑈正也蒔殖立也蒔更也鬐尾稍盡也尾梢也𣨶𠌁𠉮也鼃律始也蓐臧厚也遵遃行也䭨餟餽也餼䭘飽也惵耇嬴也趙肖小也蚩愮悖也吹扇助也焜曅暴晠也苦翕熾也蘊崇也蘊嗇積也嗇殄合也翬䎗飛也憤目盈也譟諻音也攎張也岑夤大也岑高也效昈文也鈵董錮也扞搷揚也水中可居為洲三輔謂之淤蜀漢謂之嬖殹幕也刳狄也度高為揣半步為跬半盲為睺未陞天龍謂之蟠龍裔夷狄之揔名考引也弼高也上重也箇枚也一蜀也南楚謂之獨
