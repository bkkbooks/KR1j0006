body:
  text: 第十二輶軒使者絶代語釋別國方言第十二爰喛哀也儒輸愚也愋諒知也拊撫疾也菲惄悵也鬱熙長也娋孟姊也築娌匹也娌耦也䃷裔習也躔逡偱也躔歷行也日運為躔月運為逡逭逳轉也逭逳步也烽虞望也榆楕脫也解輸梲也賦與操也歇涸也潎澄清也逯遡行也墾牧司也墾力也牧飼也監牧察也𡚊始也𡚊化也鋪脾止也攘掩止也幕覆也侗胴狀也匹杪小也屑往勞也屑𢛛獪也效烓明也𣏾將威也媯娗僈也儇虔謾也佻疾也鞅侼強也鞅侼懟也追未隨也僉怚劇也僉夥也夸蒸淫也毗顮悶也焭激清也紓退緩也清躡急也杼解也𨆪逞解也柢柲刺也倩荼借也憵朴猝也麋梨老也萃離時也漢赫怒也赫發也誇吁然也猜忦恨也艮磑堅也苂𦪶明也怤愈悅也即圍就即半也惙㤕中也薵蒙覆也籌戴也堪輂載也搖祖上也祖搖也祖轉也括關閉也衝俶動也羞厲熟也厲今也備該咸也噬食也噬憂也𢜽悸也虜鈔強也鹵奪也鑈正也蒔殖立也蒔更也鬐尾稍盡也尾梢也𣨶𠌁倦也蛙律始也蓐臧厚也遵遃行也䬽餟餽也餼䭘飽也惵耇嬴也趙肖小也蚩愮悖也吹扇助也焜曅暴晠也苦翕熾也蘊崇也蘊嗇積也嗇殄合也翬䎗飛也憤目盈也譟諻音也攎張也岑夤大也岑高也效昈文也鈵董錮也扞搷揚也水中可居為洲三輔謂之淤蜀漢謂之嬖殹幕也刳狄也度高為揣半步為跬半盲為睺未升天龍謂之蟠龍裔夷狄之揔名考引也弼高也上重也箇枚也一蜀也南楚謂之獨
