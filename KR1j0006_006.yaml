body:
  text: 第六輶軒使者絶代語釋別國方言第六聳欲也荊吳之間曰聳晉趙曰自關而西秦晉之間相勸曰聳或曰中心不欲而由旁人之勸語亦曰聳凡相被飾亦曰聳䏁聾也半聾梁益之間謂之䏁秦晉之間聽而不聰聞而不達謂之䏁生而聾陳楚江淮之間謂之聳荊揚之間及山之東西雙聾者謂之聳聾之甚者秦晉之間謂之𦘍吳楚之外郊凡無有耳者亦謂之𦘍其言聧者若秦晉中土謂墮耳者䎳也陂徭袤也陳楚荊揚曰陂自山而西凡物細大不純者謂之徭由迪正也東齊青徐之間相正謂之由迪㥏恧慚也荊揚青徐之間曰㥏若梁益秦晉之間言心內慚矣山之東西自愧曰恧趙魏之間謂之䎵弿展難也齊晉曰弿山之東西凡難貌曰展荊吳之人相難謂之展若秦晉之言相憚矣齊魯曰燀胥由輔也吳越曰胥燕之北鄙曰由蛩㤨戰栗也荊吳曰蛩㤨蛩㤨又恐也錪錘重也東齊之間曰錪宋魯曰錘鋡龕受也齊楚曰鋡揚越曰龕受盛也猶秦晉言容盛也矔眮轉目也梁益之間瞋目曰矔轉目顧視亦曰矔吳楚曰眮逴騷𡯴蹇也吳楚偏蹇曰騷齊楚晉曰逴𤺊嗌噎也楚曰廝秦晉或曰嗌又曰噎怠陀壞㘿墊下也凡柱而下曰㘿屋而下曰墊伆邈離也楚謂之越或謂之遠吳越曰伆顛頂上也誣䛳與也吳越曰誣荊齊曰䛳與猶秦晉言阿與掩𡩡取也自關東曰掩自門而西曰𡩡或曰狚䁙䀩視也東齊曰䁙吳揚曰䀩凡以目相戲曰䁙遙廣遠也梁楚曰遙汨遙疾行也南楚之外曰汨或曰遙蹇妯擾也人不靜曰妯秦晉曰蹇齊宋曰妯絓挈𠎽介特也楚曰儝晉曰絓秦曰挈物無耦曰特獸無耦曰介飛鳥曰雙鴈曰乘台既失也宋魯之間曰台既隱據定也稟浚敬也秦晉之間曰稟齊曰浚吳楚之間自敬曰稟悛懌改也自山而東或曰悛或曰懌坁坦場也梁宋之間蚍蜉䵓鼠之場謂之坁蚓場謂之坦徥用行也朝鮮洌水之間或曰徥鋪頒索也東齊曰鋪頒猶秦晉言抖藪也參蠡分也齊曰參楚曰蠡秦晉曰離廝披散也東齊聲散曰𤺊器破曰披秦晉聲變曰𤺊器破而不殊其音亦謂之𤺊器破而未離謂之璺南楚之間謂之𢻹緍綿施也秦曰緍趙曰綿吳越之間脫衣相被謂之緍綿悀逼滿也凡以器盛而滿謂之悀腹滿曰逼徯醯冉鐮危也東齊槣物而危謂之徯醯僞物謂之冉鐮紕繹督雉理也秦晉之間曰紕凡物曰督之絲曰繹之矤呂長也東齊曰矤宋魯曰呂䠇膐力也東齊曰䠇宋魯曰膐膐田力也瘱𧫚審也齊楚曰瘱秦晉曰𧫚𧬇𧫚諟也吳越曰𧬇𧫚掩掩錯摩滅也荊楚曰掩吳揚曰掩周秦曰錯陳之東鄙曰摩抾摸去也齊趙之總語也抾摸猶言持去也舒勃展也東齊之間凡展物謂之舒勃摳揄旋也秦晉凡物樹稼早成熟謂之旋燕齊之間謂之摳揄絙筳竟也秦晉或曰緪或曰竟楚曰筳𢸴𠟪續也秦晉續折謂之𢸴繩索謂之𠟪擘楚謂之紉閻笘開也東齊開戶謂之閻苫楚謂之闓杼柚作也東齊土作謂之杼木作謂之柚厲卬為也甌越曰卬吳曰厲戲憚怒也齊曰戲楚曰憚爰喛恚也楚曰爰秦晉曰喛皆不欲譍而強畣之意也𠋢艾長老也東齊魯衛之間凡尊老謂之𠋢或謂之艾周晉秦隴謂之公或謂之翁南楚謂之父或謂之父老南楚洭之間母謂之媓謂婦妣曰母姼稱婦考曰父姼巍嶢崝嶮高也猒塞安也㥄𢜮憐也掩翳薆也佚愓緩也
