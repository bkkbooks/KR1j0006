body:
  text: 輶軒使者絶代語釋別國方言第九戟楚謂之取名於鈎釨也凡戟而無刃秦晉之間謂之或謂之鏔音寅吳揚之間謂之戈東齊秦晉之間謂其大者曰鏝胡泥鏝其曲者謂之鈎鏝胡即今雞鳴勾孑戟也三刃枝今㦸中有小孑刺者所謂雄㦸也南楚宛郢謂之匽戟音偃郢今江陵也余正反其柄自關而西謂之柲音袐或謂之殳音殊矛呉揚江淮南楚五湖之間謂之鍦甞蛇反五湖今呉興太湖也先儒處之多亦不了所未能詳者或謂之鋋音蟬或謂之鏦漢書曰鏦殺呉王錯江反其柄謂之矜今字作􅚙巨巾反箭自關而東謂之矢江淮之間謂之鍭音侯關西曰箭箭者竹名因以爲號鑚謂之鍴音端矜謂之杖矛㦸􅚙即杖也劒削自河而北燕趙之間謂之窒自關而東或謂之廓或謂之削自關而西謂之􅔖方婢切盾自關而東或謂之瞂音伐或謂之干干者扞也關西謂之盾車下鐵陳宋淮楚之間謂之畢未詳大車謂之綦鹿車也音忌車䡺車軸頭也干厲反齊謂之又名車枸簍即車弓也音縷宋魏陳楚之間謂之䈐今呼車子弓爲䈐音巾或謂之􅦶籠穹隆兩音其上約謂之即軬帶也音瓜瓝或謂之䈿音脉秦晉之間自關而西謂之枸簍西隴謂之㮥即畚字薄晩反南楚之外謂之篷今亦通呼篷或謂之隆屈尾屈輪車輅也韓楚之間謂之軑音大或謂之軝詩曰約軝錯衡音祇關西謂之􅭿音揔輑謂之軸牛忿反轅楚衞之間謂之輈張由反箱謂之輫音俳軫謂之枕車後横木車紂自關而東周洛韓鄭汝潁而東謂之䋺音秋或謂之曲綯綯亦繩名詩曰宵尓索綯或謂之曲綸今江東通呼索綸音倫自關而西謂之紂輨音管軑音大錬􅣾錬音東􅣾音度果反關之東西曰輨南楚曰軑趙魏之間曰錬􅣾車釭齊燕海岱之間謂之鍋音戈或謂之錕衮衣自關而西謂之釭盛膏者乃謂之鍋凡箭鏃胡合嬴者胡鏑在於喉下嬴邊也四鐮廉稜也或曰拘腸三鐮者謂之羊頭其廣長而薄鐮謂之錍普蹄反或謂之鈀音葩箭其小而長中穿二孔者謂之鉀鑪今箭錍鑿空兩邊者也嗑嚧兩音其三鐮長尺六者謂之飛䖟此謂今射箭也􅚵者謂之平題今戯射箭頭題猶羊頭也所以藏箭弩謂之箙盛弩箭器也外傳曰檿弧箕箙弓謂之鞬鞬牛或謂之皾牛犢凡矛骹細如鴈脛者謂之鶴䣛今江東呼爲鈐釘有小枝刃者謂之鉤矛或謂之錟謂之鈹今江東呼大矛爲鈹音彼錟音聃骹謂之銎即矛刃下口音凶鐏謂之釬音扞或名爲鐓音頓舟自關而西謂之船自關而東或謂之舟或謂之航行伍南楚江湘凡船大者謂之舸姑可反小舸謂之艖今江東呼艖小底者也音乂艖謂之艒䑿目宿二音小艒䑿謂之艇􅔓也艇長而薄者謂之艜衣帶短而深者謂之䒀今江東呼艖䒀者音歩小而深者謂之㮪即長舼也音卭竹東南丹陽㑹稽之間謂艖爲欚音禮泭謂之竺二稗音敷竺二稗謂之筏音伐筏秦晉之通語也江淮家居竺二稗中謂之薦音符方舟謂之㶇揚州人呼渡津航爲抗荆州人呼樹音横艁舟謂之浮梁即今浮橋楫謂之橈如寮反或謂之櫂今云櫂歌依此名也所以隱櫂謂之摇􅳻小橛也江東又名爲胡人音奬所以縣櫂謂之緝繫櫂頭索也所以刺船謂之㰏音髙維之謂之鼎係船爲維首謂之閤閭今江東呼船頭屋爲之飛閭是也或謂之艗艏鷁鳥名也今江東貴人船前作青崔是其像也音六後曰舳今江東呼拖爲舳音軸舳制水也僞謂之仡吾勃反僞音訛船動摇之㒵也仡不安也輶軒使者絶代語釋別國方言第九
