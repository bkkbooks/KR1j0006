seq: 12
front:
  text: 輶軒使者絶代語釋別國方言第十二爰喛哀也喛哀而恚也音段儒輸愚也儒輸猶儒撰也愋諒知也拊撫疾也謂急疾也音府菲惄悵也謂惋惆也音翡鬱熈長也謂壯大也音怡娋孟姉也外傳曰孟啖我是也今江東山越間呼姉聲如市此因字誤遂俗也娋音義未詳築娌匹也今關西兄弟婦相呼爲築里度六反廣雅作妯娌耦也䃷裔習也謂玩習也音盈躔度展反逡逡巡偱也躔歷行也躔猶踐也日運爲躔月運爲逡運猶行也逭音換亦管逳陽六反轉也逭逳歩也轉相訓耳㷭虞望也今云烽火是也榆楕脫也解輸梲也梲猶脫耳賦與操也謂操持也􅜷音鹿歇泄气涸也謂渴也音鶴潎妨計反􅊹音澄清也逯音鹿亦録遡音素行也墾牧司也墾力也耕墾用力牧飤也謂放飤牛馬也屑王相獪也市儈效音皎烓口類反明也
  hash: sha256:7cedea67b71121e7ccf97fc0e9c5e528da41582fde9c19a1be5de1d52852a263
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0006_SBCK_012-1a}
body:
  text: 將威也嬀居僞反娗音挺僈也爛僈健狡也博丹反儇虔謾也謂惠黠也莫錢反佻疾也謂輕疾也音糶鞅侼強也謂強戾也音㪍鞅侼懟也亦爲怨懟鞅猶怏也追未隨也僉怚劇也謂勤劇音驕怚也僉夥也僉者同故爲多音禍夸烝媱也上媱爲蒸毗顮懣也謂憒滿也音頻焭激清也紓退緩也謂寛緩也音舒清躡急也杼杼井胡計反解也蕆逞解也蕆訓勑復言解錯用其義音展柢柲刺也皆矛㦸之􅚙所以刺物者也音觸抵倩荼借也荼猶徒也憵朴猝也謂急速也劈歷打撲二音麋棃老也麋猶眉也萃離時也漢赫怒也赫發也􅹨呼瓜反吁然也音于皆應聲也猜忦恨也艮磑堅也艮磑皆石名物也五碓反苂䀶明也苂光也音滛怤愉恱也怤愉猶呴愉也音敷即圍就即半也即一作助惙㤕中也中宣爲忡忡惱怖意也薵蒙覆也籌戴也此義之反覆兩通者字或作壽音俱波濤也堪輂載也輂轝亦載物者也音釘鋦摇祖上也祖摇也祖轉也互相釋也動揺即轉矣括關閉也易曰括囊無咎音活衝俶動也羞厲熟也熟食爲羞厲今也備該咸也咸猶皆也噬食也噬憂也􅭛悸也謂悚悸也虜鈔强也皆强取物也鹵奪也鑈正也謂堅正也奴俠反蒔殖立也蒔更也爲更種也音侍鬐尾稍盡也鬐毛物漸落去之名除爲反尾梢也􅡅也今江東呼極爲􅡅音劇外傳曰余病􅡅矣鼃律始也音蛙蓐臧厚也遵遃行也遃遃行㒵也魚晩反䭨音携餟祭醊餽也音愧餼香旣反䭘音映飽也惵度協反耇音垢嬴也音盈趙肖小也蚩愮悖也謂悖惑也音遥吹扇助也吹嘘扇佛相佐助也焜曅晠也韡曅焜燿晠㒵也苦翕熾也藴崇也藴􅞋積也􅞋者貪故爲積􅞋殄合也翬䎗飛也翬翬飛㒵也音揮憤目盈也譟喚譟諻從横音也攎音攎遫音勑張也岑夤大也岑髙也岑㖗峻㒵也效昈文也昈昈文采㒵也音户鈵董錮也謂堅固也音柄扞搷揚也謂播揚也音塡水中可居爲洲三輔謂之淤音血瘀上林賦曰行乎州淤之浦也蜀漢謂之嬖手臂殹幕也謂蒙幕也音醫刳音枯狄也宜音剔度髙爲揣裳絹反半歩爲跬差箠反半盲爲睺呼鉤反一音猴未陞天龍謂之蟠龍裔夷狄之揔名邊地爲裔亦四夷通以爲号也考引也弼髙也上重也箇枚也爲枚數也古餓反一蜀也南楚謂之獨蜀猶獨耳輶軒使者絶代語釋別國方言第十二
