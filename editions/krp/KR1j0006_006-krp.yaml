seq: 6
front:
  text: 輶軒使者絶代語釋別國方言第六聳欲也皆強欲也山頂也荆呉之間曰聳晉趙曰
  hash: sha256:efc8bd05116b16e26acc1660711dd700f7334c6fa6e297cc298a87bdbd620fd6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0006_SBCK_006-1a}
body:
  text: 自關而西秦晉之間相勸曰聳或曰中心不欲而由旁人之勸語亦曰聳凡相被飾亦曰聳䏁聾也半聾梁益之間謂之䏁言胎䏁煩憒也音宰秦晉之間聽而不聦聞而不逹謂之䏁生而聾陳楚江淮之間謂之聳言無所聞當聳䏁也荆揚之間及山之東西雙聾者謂之聳聾之甚者秦晉之間謂之􅫣五刮反言聉無所聞知也外傳聾聵伺火音蒯聵呉楚之外郊凡無有耳者亦謂之􅫣其言聧者若秦晉中土謂墮耳者䎳也五刮反陂偏頗傜逍遥袤也陳楚荆揚曰陂自山而西凡物細大不純者謂之傜言娥傜也由迪正也東齊青徐之間相正謂之由迪㥏音腆恧人力反又女六反慙也荆揚青徐之間曰㥏若梁益秦晉之間言心内慙矣山之東西自愧曰恧小爾雅曰心愧爲恧趙魏之間謂之䎵音密亦袐弿音蹇展難也齊晉曰弿山之東西凡難貌曰展荆呉之人相難謂之展若秦晉之言相憚矣齊魯曰燀難而雄也昌羡反胥由輔也胥相也由正皆謂輔持也呉越曰胥燕之北鄙曰由蛩㤨戰慄也鞏恭兩音荆呉曰蛩㤨蛩㤨又恐也錪吐本反錘直睡反重也東齊之間曰錪宋魯曰錘鋡音含龕受也今云龕囊依此名也齊楚曰鋡揚越曰龕受盛也猶秦晉言容盛也矔慣習眮侹侗轉目也梁益之間瞋目曰矔轉目顧視亦曰矔呉楚曰眮逴勑落反騷先牢反蹇也跛音行􅞶踔也呉楚偏蹇曰騷齊楚晉曰逴行略逴也􅤙音斯嗌惡介反噎也皆謂咽痛也音翳楚曰􅤙秦晉或曰嗌又曰噎怠陁壞謂壊落也音虫豸未曉㘿音涅墊丁念反下也凡柱而下曰㘿屋而下曰墊伆邈離也謂乖離也音刎楚謂之越或謂之逺呉越曰伆顚頂上也誣䛳与也乙劒反呉越曰誣荆齊曰䛳与猶秦晉言阿与相阿与者所以致誣䛳也掩􅧞取也自關東曰掩自門而西曰􅧞或曰狚但伺也䁙烏拔反䀩音略視也東齊曰䁙呉楊曰䀩今中國亦云目䀩也凡以目相戯曰䁙遥廣逺也梁楚曰遥汩遥疾行也汩汩急㒵也于筆反南楚之外曰汩或曰遥蹇妯擾也謂躁擾也妯音迪人不靜曰妯秦晉曰蹇齊宋曰妯絓音乖挈口八反古焭字介特也楚曰儝晉曰絓秦曰挈物無耦曰特獸無耦曰介傳曰逢澤有介麋飛鳥曰雙鴈曰椉台旣失也宋魯之間曰台旣隱據定也稟浚敬也秦晉之間曰稟齊曰浚呉楚之間自敬曰稟悛音銓懌音弈改也自山而東或曰悛或曰懌論語曰恱而不懌坁水汦坦癰疽塲也音傷梁宋之間蚍蜉䵓䑕之塲謂之坁䵓䑕蚡䑕也螾塲謂之坦螾蛐蟮也其糞名坦螾音引徥用行也徥皆行㒵度揩反朝鮮洌水之間或曰徥鋪頒索也東齊曰鋪頒猶秦晉言抖藪也謂斗藪舉索物也鋪音敷參蠡分也謂分割也音麗齊曰參楚曰蠡秦晉曰離廝披散也東齊聲散曰􅤙器破曰披秦晉聲變曰􅤙器破而不殊其音亦謂之􅤙器破而未離謂之璺音問南楚之間謂之􆀅妨美反一音把塞緍緜施也秦曰緍趙曰緜呉越之間脫衣相被謂之緍緜相覆及之名也音旻悀音踊偪妨逼反滿也凡以器盛而滿謂之悀言涌岀也腹滿曰偪言勑偪也徯醯醯酢鐮音髯危也東齊槣物而危謂之徯醯槣居枝反僞物謂之鐮紕音毗繹音亦督雉理也秦晉之間曰紕凡物曰督之言正理也絲曰繹之言解繹也矤吕長也古矧字東齊曰矤宋魯曰吕䠇膐力也東齊曰䠇律䠇多力㒵宋魯曰膐膐田力也謂耕墾也瘱埋也又翳􅨣瓜蔕審也齊楚曰瘱秦晉曰􅨣􅰾音翳􅨣亦音蔕諟也亦審諟㸦見其義耳音帝呉越曰􅰾􅨣揞烏感反揜錯音酢摩滅也荆楚曰揞呉揚曰揜之􅱅擘音檗楚謂之紉今亦以綫貫針爲紉音刃閻笘開也東齊開户謂之閻苫楚謂之闓亦開字也杼柚作也東齊土作謂之杼木作謂之柚厲印爲也爾雅曰俶厲作作亦爲也甌越曰卬呉曰厲戲憚怒也齊曰戲楚曰憚爰喛恚也謂悲恚也楚曰爰秦晉曰喛皆不欲譍而強畣之意也傁艾長老也東齊魯衞之間凡尊老謂之傁或謂之艾禮記曰五十爲艾周晉秦隴謂之公或謂之翁南楚謂之父或謂之父老南楚瀑洭之間暴匡兩音洭水在桂陽母謂之媓謂婦妣曰母姼音多稱婦考曰父姼古者通以考妣爲生存之稱巍嶢崝嶮髙也嶕嶢崝嵤髙峻之㒵也猒塞安也物足則定㥄音凌􅤷亡主反憐也掩翳薆也謂蔽薆也詩曰薆而不見音愛佚惕緩也跌唐兩音輶軒使者絶代語釋別國方言第六
