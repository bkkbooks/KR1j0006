body:
  text: 輶軒使者絶代語釋別國方言第七諄憎所疾也之潤反宋魯凡相惡謂之諄憎若秦晉言可惡矣杜蹻歰也趙曰杜今俗語通言歰如杜杜棃子歰因名之山之東西或曰蹻郄蹻燥歰㒵音笑謔佻抗縣也趙魏之間曰佻自山之東西曰抗燕趙之郊縣物於臺之上謂之佻了佻縣物㒵丁小反發稅舎車也舎宜音寫東齊海岱之間謂之發今通言發寫也宋趙陳魏之間謂之稅稅猶脫也肖類法也齊曰類西楚梁益之間曰肖秦晉之西鄙自冀隴而西冀縣今在天水使犬曰哨音騷西南梁益之間凡言相類者亦謂之肖肖者似也憎懹憚也相畏憚也陳曰懹譙字或作誚讙火袁反讓也齊楚宋衞荆陳之間曰譙自關而西秦晉之間凡言相責讓曰譙讓北燕曰讙僉胥皆也自山而東五國之郊曰僉六國唯秦在山西東齊曰胥侔莫強也北燕之外郊凡勞而相勉若言努力者謂之侔莫􅮜倯罵也蠃小可憎之名也􅮜音卭竹燕之北郊曰􅮜倯展悙信也東齊海岱之間曰展燕曰悙悙亦誠信㒵斯掬離也齊陳曰斯燕之外郊朝鮮洌水之間曰掬蝎音曷噬卜筮逮也東齊曰蝎北燕曰噬逮通語也皮傅彈憸強也謂強語也音僉秦晉言非其事謂之皮傅東齊陳宋江淮之間曰彈憸膊普博反曬霜智反晞㬥也東齊及秦之西鄙言相㬥僇爲膊㬥僇謂相暴􅣭惡事音膊脯燕之外郊朝鮮洌水之間凡㬥肉發人之私披牛羊之五藏謂之膊㬥五穀之類秦晉之間謂之曬東齊北燕海岱之郊謂之晞熬㷅即􅱊字也創眇反煎㷶皮力反鞏火乾也凡以火而乾五穀之類自山而東齊楚以往謂之熬關西隴冀以往謂之㷶秦晉之間或謂之㷅凡有汁而乾謂之煎東齊謂之鞏拱手胹而飪荏亨爛糦熾酋囚酷熟也自關而西秦晉之郊曰胹徐揚之間曰飪嵩嶽以南陳潁之間曰亨自河以北趙魏之間火熟曰爛氣熟曰糦久熟曰酋穀熟曰酷熟其通語也魏盈怒也魏上巳音燕之外郊朝鮮洌水之間凡言呵叱者謂之魏盈䠆􅭣音務隑企欺䜴反立也東齊海岱北燕之郊跪謂之䠆􅭣今東郡人亦呼長跽爲䠆􅭣委痿謂之隑企脚躄不能行也瀧涿謂之霑漬瀧涿猶瀬滯也音籠希鑠摩也燕齊摩鋁謂之希音慮平均賦也燕之北鄙東齊北郊凡相賦斂謂之平均羅謂之離離謂之羅皆行列物也釗超逺也釗上巳音燕之北郊曰釗東齊曰超漢澷䀼眩懣也䀼音瞋恚朝鮮洌水之間煩懣謂之漢澷顚眴謂之䀼眩眩音懸憐職愛也言相愛憐者呉越之間謂之憐職茹食也呉越之間凡貪飲食者謂之茹今俗呼能粗食者爲茹音勝如竘貌治也謂治作也竘恪垢反呉越飾貌爲竘或謂之巧語楚聲轉耳煦州呼煆呼夏反熱也乾也熱則乾慘呉越曰煦煆攍音盈膂賀儋也今江東呼擔兩頭有物爲音鄧齊楚陳宋之間曰攍莊子曰攍粮而赴之燕之外郊越之垂甌呉之外鄙謂之膂擔者用膂力因名云南楚或謂之攍自關而西隴冀以往謂之賀今江東語亦然凡以驢馬馲駝載物者謂之負他音大亦謂之賀樹植立也燕之外郊朝鮮洌水之間凡言置立者謂之樹植過度謂之渉濟猶今云濟度福禄謂之祓戩廢箭兩音傺音際眙勑吏反逗也逗即今住字也南楚謂之傺西秦謂之眙眙謂住視也西秦酒泉燉煌張掖是也逗其通語也輶軒使者絶代語釋別國方言第七
