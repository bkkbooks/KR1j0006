body:
  text: 郭璞蓋聞方言之作出乎輶軒之使所以巡遊萬國采覽異言車軌之所交人迹之所蹈靡不畢載以爲奏籍周秦之季其業隳廢莫有存者曁乎揚生沉淡其志歷載􅌟綴乃就斯文是以三五之篇著而獨鑒之功顯故可不出户庭而坐照四表不勞疇咨而物來能名考九服之逸言摽六代之絶語類離詞之指韻明乖途而同致辨章風謡而區分曲通萬殊而不雜眞洽見之竒書不刊之碩記也余少玩雅訓旁味方言復爲之解觸事廣之演其未及摘其謬漏庶以燕石之瑜補琬琰之瑕俾後之瞻渉者可以廣寤多聞爾西漢氏古書之全者如鹽鐵論楊子雲方言其存蓋無幾鹽鐵論前輩毎恨其文章不稱漢氏唯方言之書最竒古孟傳頃聞之曽文清公甞以三詩答吕治先有云傷心昨夜杯中物不對王郎對影斟紫微吕居仁次韻云書來肯附銅魚使記我今年病不斟自注云岀子雲方言今所在鏤板輙誤作病不禁此書世所有而無與是正知好之者少也山谷詩云追隨冨貴勞牽尾乃用太元經語紹興初胡少汲洪玉父李文若諸人校黄詩刋本乃誤作榮牽尾自此他本遂承誤鬰蒼蒼三字文人多愛之亦或鮮記其出於太元大抵子雲精於小學且多見先秦古書故方言多識竒字太元多有竒語然其用之亦各有冝子雲諸賦多古字至法言劇秦所用則無幾古人文章蓋莫不然西漢一書唯相如子雲等諸賦韓退之文唯曹成王碑柳子厚自騷詞晉問等他皆不用古字本朝歐文忠王荆公蘇長公曽南豐諸宗工文章照映今古亦不多用古字得非以謂古文竒字聲形之學雖在所當講而文律之妙則不專在是若有意用之或返累正氣也耶學者要知所以用之當其可則盡善耳今方言自閩本外不多見毎惜其未廣予來官㝷陽有以大字本見示者因刋置郡齋而附以所聞一二蓋惜前輩之言乆或不傳也慶元庚申仲春甲子㑹稽李孟傳書漢儒訓詁之學惟謹而楊子雲尤爲洽聞盖一物不知君子所耻博學詳說將以反約凢其辨名物析度數研精覃思毫釐必計下而五方之音殊俗之語莫不推尋其故而旁通其義非徒猥瑣拘泥而爲是弗憚煩也丗之學者忽近而慕逺捨實而徇名髙談性命過自賢聖視訓詁諸書往往束之髙閣盍亦思夫周官太平之典其道甚大百物不廢雖醫卜方技纎悉畢載聖門學詩不獨取其可興可觀可群可怨而鳥獸草木之名亦貴多識本末精粗並行而不相悖故漢儒尊經重古純慤有守之風類非後人所能企及子雲博極群書於小學竒字無不通且逺採諸國以爲方言誠足備爾雅之遺闕平時所以用力於此深矣丗知好之者盖鮮前太守尚書郎李公一日語餘苦無善本質偶得諸相識字畫落落可觀因以告而鋟之木輙併附管見云慶元庚申重午日東陽朱質書
