front:
  text: 輶軒使者絶代語釋別國方言第四襌衣江淮南楚之間謂之褋楚辭曰遺佘褋兮澧浦音簡牒關之東西謂之襌衣有袌者前施袌囊也房報反趙魏之間謂之袏衣無袌者謂之裎衣音逞古謂之深衣制見禮記襜褕江淮南楚謂之􅥗褣裳凶反自關而西謂之襜褕其短者謂之裋褕音豎以布而無縁敝而紩之謂之襤褸自關而西謂之䘪䘿俗名䘿掖音倔其敝者謂之緻緻縫納敝故名之也丁履反汗襦廣雅作䄖江淮南楚之間謂之䙢音甑自關而西或謂之衹裯衹音止裯丁牢反亦呼爲掩汗也自關而東謂之甲襦陳魏宋楚之間謂之襜襦或謂之襌襦今或呼衫爲單襦帬陳魏之間謂之帔音披自關而東或謂之襬音碑今關西語然也蔽䣛江淮之間謂之褘音韋或暉或謂之袚音沸魏宋南楚之間謂之大巾自關東西謂之蔽䣛齊魯之郊謂之袡昌詹反襦字亦作褕又襦無右也西南屬漢謂之曲領或謂之襦褌陳楚江淮之間謂之䘴錯勇反袴齊魯之間謂之䙭傳曰徴蹇與襦音騫或謂之襱今俗呼袴踦爲襱音鮦魚關西謂之袴褕謂之袖襦䙭有袖者因名云衱謂之褗即衣領也劫偃兩音袿謂之裾衣後裾也或作袪廣雅云衣袖褸謂之衽衣襟也或曰裳際也褸謂之緻襤褸綴結也裯謂之襤衹裯弊衣亦謂襤褸無縁之衣謂之襤無袂衣謂之䙃袂衣袖也音藝䙃音慢惰無之袴謂之襣袴無踦者即今犢鼻褌也亦襱字異耳䘯謂之干苕丁俠兩反未詳其義袒餙謂之直衿婦人初嫁所著上衣直衿也音但襃明謂之袍廣雅云襃明長襦也繞衿謂之帬俗人呼接下江東通言下裳懸裺謂之縁衣縫縁也音掩絜襦謂之蔽膝廣異名也裪􅰁謂之袖衣褾音􅰁江東呼䘼音婉帍裱謂之被巾婦人領巾也方廟反繞䋸謂之裺衣督脊也䋸音循厲謂之帶小爾雅曰帶之垂者爲厲襎裷謂之幭即帊幞也煩冤兩音幭亡別反繄袼謂之䙔即小兒次衣也翳洛嘔三音楚謂無縁之衣曰襤紩衣謂之褸秦謂之緻自關而西秦晉之間無縁之衣謂之䘪䘿嫌上說有未了故復分明之複襦江湘之間謂之音竪或謂之筩褹今筩袖之襦也褹即袂字耳大袴謂之倒頓今雹袴也小袴謂之䘨􅤨今袴也皎了兩音楚通語也􅞲巾也巾主覆者故名􅞲也大巾謂之􅜳音芬嵩嶽之南嵩髙中岳山也今在河南陽城縣陳潁之間謂之帤如豬反亦謂之􅞲江東通呼巾􅜳耳絡頭帞頭也音貊紗繢䰎帶羌位反䰂帶音菜􅱄音綪亦千㡋於怯反幧頭也自關以西秦晉之郊曰絡頭南楚江湘之間曰帞頭自河以北趙魏之間曰幧頭或謂之􅱄或謂之㡋其遍者謂之䰎帶今之偏疊幧頭也或謂之䰂帶䰂亦結也覆結謂之幘巾或謂承露或謂之覆䰂今結籠是也皆趙魏之間通語也屝屨麤履也徐兖之郊謂之屝音翡自關而西謂之屨中有木者謂之複舄自關而東複履其􅋻者謂之下音婉襌者謂之鞮今韋鞮也絲作之者謂之履麻作之者謂之不借粗者謂之
