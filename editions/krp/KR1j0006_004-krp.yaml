body:
  text: 東北朝鮮洌水之間謂之䩕音卬角南楚江沔之間揔謂之麤沔水今在襄陽西南梁益之間或謂之他回反字或作音同或謂之䋀下瓦反一音畫履其通語也徐土邳圻之間今下䂙也圻音祁大麤謂之䩕角今漆履有齒者緉音兩􅥭音爽絞也謂履中絞也音校關之東西或謂之緉或謂之􅥭絞通語也纑謂之縝謂纑縷也音振輶軒使者絶代語釋別國方言第四
  hash: sha256:825aaf4504612f1fc6005746851acd68e627f7ea7a3a9b9f275a41b1edfbdbd6
