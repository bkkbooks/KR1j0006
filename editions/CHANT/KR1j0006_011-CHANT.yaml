body:
  text: 第十一輶軒使者絕代語釋別國方言第十一蛥蚗齊謂之螇螰楚謂之蟪蛄或謂之蛉蛄秦謂之蛥蚗自關而東謂之虭蟧或謂之蝭蟧或謂之蜓蚞西楚與秦通名也襌楚謂之蜩宋衛之間謂之螗蜩陳鄭之間謂之蜋蜩秦晉之間謂之蟬海岱之間謂之𦭶其大者謂之蟧或謂之蝒馬其小者謂之麥蚻有文者謂之蜻蜻其䳄蜻謂之疋一大而黑者謂之䗃黑而赤者謂之蜺蜩蟧謂之𧓿蜩𧕄謂之寒蜩寒蜩瘖蜩也蛄詣謂之杜蛒螻螲謂之螻蛄或謂之蟓蛉南楚謂之杜狗或謂之蛞螻蜻蛚楚謂之蟋蟀或謂之蛬南楚之間謂之蚟孫螳蜋謂之髦或謂之虰或謂之䖹䖹姑䗐謂之強䖹蟒宋魏之間謂之蚮南楚之外謂之蟅蟒或謂之蟒或謂之𧑥蜻蛉謂之蝍蛉舂黍謂之𧐱蝑蠀𧑙謂之蚇蠖𧒒燕趙之間謂之蠓螉其小者謂之𧕪螉或謂之蚴蛻其大而蜜謂之壺蠭蠅東齊謂之羊陳楚之間謂之蠅自關而西秦晉之間謂之蠅蚍蜉齊魯之間謂之蚼蟓西南梁益之間謂之玄蚼燕謂之蛾䖹其場謂之坻或謂之蛭蠀螬謂之蟦自關而東謂之蝤蠀或謂之䖭蠾或謂之蝖螜梁益之間謂之蛒或謂之蝎或謂之蛭蛒秦晉之間謂之蠹或謂之天螻四方異語而通者也蚰𧎘自關而東謂之螾𧍢或謂之入耳或謂之䗅𧕯趙魏之間或謂之蚨虶北燕謂之䖡蚭鼅鼄鼄蝥也自關而西秦晉之間謂之鼄蝥自關而東趙魏之郊謂之鼅鼄或謂之蠾蝓蠾蝓者侏儒語之轉也北燕朝鮮洌水之間謂之蝳蜍蜉䖻秦晉之間謂之蟝𧐯馬蚿北燕謂之蛆蟝其大者謂之馬蚰
