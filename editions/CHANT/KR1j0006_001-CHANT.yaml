body:
  text: 第一輶軒使者絕代語釋別國方言第一黨曉哲知也楚謂之黨或曰曉齊宋之間謂之哲虔儇慧也秦謂之謾晉謂之㦟宋楚之間謂之倢楚或謂之䜏自關而東趙魏之間謂之黠或謂之鬼娥㜲好也秦曰娥宋魏之間謂之㜲秦晉之間凡好而輕者謂之娥自關而東河濟之間謂之媌或謂之姣趙魏燕代之間曰姝或曰妦自關而西秦晉之故都曰妍好其通語也烈枿餘也陳鄭之間曰枿晉衛之間曰烈秦晉之間曰肄或曰烈台胎陶鞠養也晉衛燕魏曰台陳楚韓鄭之間曰鞠秦或曰陶汝潁梁宋之間曰胎或曰艾憮㤿憐牟愛也韓鄭曰憮晉衛曰㤿汝潁之間曰憐宋魯之間曰牟或曰憐憐通語也㥄憮矜悼憐哀也齊魯之間曰矜陳楚之間曰悼趙魏燕代之間曰㥄自楚之北郊曰憮秦晉之間或曰矜或曰悼咺唏㣿怛痛也凡哀泣而不止曰咺哀而不泣曰唏於方則楚言哀曰唏燕之外鄙朝鮮洌水之間少兒泣而不止曰咺自關而西秦晉之間凡大人少兒泣而不止謂之唴哭極音絕亦謂之唴平原謂啼極無聲謂之唴哴楚謂之噭咷齊宋之間謂之喑或謂之惄悼惄悴憖傷也自關而東汝潁陳楚之間通語也汝謂之惄秦謂之悼宋謂之悴楚潁之間謂之憖慎濟䁮惄溼桓憂也宋衛或謂之慎或曰䁮陳楚或曰溼或曰濟自關而西秦晉之間或曰惄或曰溼自關而西秦晉之間凡志而不得欲而不獲高而有墜得而中亡謂之溼或謂之惄鬱悠懷惄惟慮願念靖慎思也晉宋衛魯之間謂之鬱悠惟凡思也慮謀思也願欲思也念常思也東齊海岱之間曰靖秦晉或曰慎凡思之貌亦曰慎或曰惄敦豐厖𡗦憮般嘏奕戎京奘將大也凡物之大貌曰豐厖深之大也東齊海岱之間曰𡗦或曰憮宋魯陳衛之間謂之嘏或曰戎秦晉之間凡物壯大謂之嘏或曰夏秦晉之間凡人之大謂之奘或謂之壯燕之北鄙齊楚之郊或曰京或曰將皆古今語也初別國不相往來之言也今或同而舊書雅記故俗語不失其方而後人不知故為之作釋也假𢓜懷摧詹戾艐至也邠唐冀兗之間曰假或曰𢓜齊楚之會郊或曰懷摧詹戾楚語也艐宋語也皆古雅之別語也今則或同嫁逝徂適往也自家而出謂之嫁由女而出為嫁也逝秦晉語也徂齊語也適宋魯語也往凡語也謾台脅鬩懼也燕代之間曰謾台齊楚之間曰脅鬩宋衛之間凡怒而噎噫謂之脅鬩南楚江湘之間謂之嘽咺虔劉慘㨆殺也秦晉宋衛之間謂殺曰劉晉之北鄙亦曰劉秦晉之北鄙燕之北郊翟縣之郊謂賊為虔晉魏河內之北謂㨆曰殘楚謂之貪南楚江湘之間謂之欺亟憐憮㤿愛也東齊海岱之間曰亟自關而西秦晉之間凡相敬愛謂之亟陳楚江淮之間曰憐宋衛邠陶之間曰憮或曰㤿眉棃耋鮐老也東齊曰眉燕代之北鄙曰棃宋衛兗豫之內曰耋秦晉之郊陳兗之會曰耇鮐脩駿融繹尋延長也陳楚之間曰脩海岱大野之間曰尋宋衛荊吳之間曰融自關而西秦晉梁益之間凡物長謂之尋周官之法度廣為尋幅廣為充延永長也凡施於年者謂之延施於眾長謂之永允訦恂展諒穆信也齊魯之間曰允燕代東齊曰訦宋衛汝潁之間曰恂荊吳淮汭之間曰展西甌毒屋黃石野之間曰穆眾信曰諒周南召南衛之語也碩沈巨濯訏敦夏于大也齊宋之間曰巨曰碩凡物盛多謂之寇齊宋之郊楚魏之際曰夥自關而西秦晉之間凡人語而過謂之𨘌或曰僉東齊謂之劍或謂之弩弩猶怒也陳鄭之間曰敦荊吳揚甌之郊曰濯中齊西楚之間曰訏自關而西秦晉之間凡物之壯大者而愛偉之謂之夏周鄭之間謂之暇郴齊語也于通詞也牴𠊷會也雍梁之間曰牴秦晉亦曰牴凡會物謂之𠊷華荂晠也齊楚之間或謂之華或謂之荂墳地大也青幽之間凡土而高且大者謂之墳張小使大謂之廓陳楚之間謂之摸嬛蟬撚未續也楚曰嬛嬋出也楚曰蟬或曰未及也𨃚䠛𧿳跳也楚曰䟷陳鄭之間曰䠛楚曰蹠自關而西秦晉之間曰跳或曰𨃚躡郅跂𢓜躋䠯登也自關而西秦晉之間曰躡東齊海岱之間謂之躋魯衛曰郅梁益之間曰𢓜或曰跂逢逆迎也自關而東曰逆自關而西或曰迎或曰逢撏攓摭挻取也南楚曰攓陳宋之間曰摭衛魯揚徐荊衡之郊曰撏自關而西秦晉之間凡取物而逆謂之籑楚部或謂之挻餥飵食也陳楚之內相謁而食麥饘謂之餥楚曰飵凡陳楚之郊南楚之外相謁而飧或曰飵或曰䬯秦晉之際河陰之間曰䭡䭓此秦語也釗薄勉也秦晉曰釗或曰薄故其鄙語曰薄努猶勉努也南楚之外曰薄努自關而東周鄭之間曰勔釗齊魯曰勗茲
