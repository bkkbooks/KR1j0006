body:
  text: 猶軒使者絶代語釋別國方言第八虎陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳虎食物值耳即止以觸其諱故或謂之於於音烏今江南山夷呼虎爲音狗竇自􅀜東西或謂之伯都俗曰伯都事抑虎􅀃􅆛狸別名也音毗陳楚江淮之間謂之音來北燕朝鮮之間謂之􅲆今江南呼爲􅲆狸音丕􅀜西謂之狸此通名耳未聞語所岀貛豚也音歡􅀜西謂之貒波湍雞陳楚宋魏之間謂之鸊䲬避祗兩音桂林之中謂之割雞或曰音從北燕朝鮮洌水之間謂伏雞曰抱房奥反江東呼蓲央富反爵子及雞雛皆謂之鷇恪遘反􅀜西曰鷇音其卯伏而未孚始化謂之涅豬北燕朝鮮之間謂之豭猶云豭斗也􅀜東西或謂之􅇾或謂之豕南楚謂之豨其子或謂之豚或謂之貕音奚呉揚之間謂之豬子其檻及蓐曰橧爾雅曰所寢橧音繒布榖自􅀜東西梁楚之間謂之結誥周魏之間謂之擊穀自􅀜而西或謂之布穀今江東呼爲􆇱穀䳚鴠鳥似雞五色冬無毛亦倮晝夜鳴侃旦兩音周魏齊宋楚之間謂之定甲或謂之獨舂奸自低仰自􅀜而東謂之城旦言其辛苦有似於罪禍者或謂之倒懸好自懸於樹也或謂之鴠鴠自􅀜而西秦隴之内謂之鶡鴠鳩自􅀜而東周鄭之郊韓魏之都謂之􅟇音郎鷱音臯其􅝣鳩謂之鸊鷱自􅀜而西秦漢之間謂之鵴鳩菊花其大者謂之鳻鳩音班其小者謂之􅝣鳩今荆鳩也或謂䳫鳩音葵或謂之䳕鳩音浮或謂之鶻鳩梁宋之間謂之鷦䲩尸鳩桉爾雅即布穀非戴勝也或云鸇皆失之也燕之東北朝鮮洌水之間謂之鶝䲹福不兩音自􅀜而東謂之戴鵀東齊海岱之間謂之戴南南猶鵀也此亦語楚聲轉也或謂之鶭鸅案爾雅􅀃戴鵀下鶭鸅自別一鳥名方言似依此義又失也或謂之戴鳻或謂之戴勝勝所以􅅶絍東齊呉􅀭之間謂之鵀自􅀜而西謂之服鶝或謂之鶝燕之東北朝鮮洌水之間謂之􅫁音或蝙蝠邊福兩音自􅀜而東謂之服翼或謂之飛䑕或謂之老䑕或謂之􅞳䑕自􅀜而西秦隴之間謂之蝙蝠北燕謂之蟙䘃墨兩音鴈自􅀜而東謂之鴚䳘音加南楚之外謂之䳘或謂之鶬鴚今江東通呼爲鴚桑飛即鷦鷯也又名鷦鸎自􅀜而東謂之工爵或謂之過鸁音螺或謂之女􅬡今亦名爲巧婦江東呼布母自􅀜而東謂之鸋鴂案爾雅云鸋鴂鴟鴞鴟屬非此小雀明矣甯玦兩音自􅀜而西謂之桑飛或謂之懱爵言懱截也鸝黄自􅀜而東謂之創鶊又名商庚自􅀜而西謂之鸝黄其色黧黒而黄因名之或謂之黄鳥或謂之楚雀野鳬其小而好沒水中者南楚之外謂之鷿鷉鷿音指辟鷉音他奚反大者謂之鶻蹏滑蹄兩音雞雛徐魯之間謂之秋侯子子幽反徐今下邳僮縣東南大徐城是也輶軒使者絶代語釋別國方言第八
