body:
  text: 輶軒使者絶代語釋別國方言第十三裔歷相也裔旅末也􅴡縁廢也純毣好也毣毣小好㒵也音沐藐素廣也藐藐曠逺㒵音邈藐漸也􅶕踊躍抍㧻拔拔也出㲻爲抍出火爲䠯也抍一作椒􅶕一作䠯炖託孫反焃音䦧煓波湍赫貌也皆火盛熾之㒵憤竅孔竅阨也謂迫阨烏革反杪眇小也讟咎謗也謗言噂讟也音沓蕆敕戒備也蕆亦訓敕摵音蹜㨖音致到也聲腆忘也􅒠音廓劙音儷解也魏能也㑜刻也聳悚也謂警聳也山頂反跌蹷也偃地反江東言跢丁賀反蘪蕪也謂草穢蕪也音務澷淹敗也溼敝爲澷水敝爲淹皆謂水潦澷澇壞物也釐音狸挴亡改反貪也㩩恪穎反挻音延竟也譴喘轉也譴喘猶宛轉也困胎逃也皆謂逃叛也音鞭撻隋毻易也謂解毻也他臥反朓􅀃好也謂姅恱也音遥憚怛惡也心怛懐亦惡難也呉大也灼驚也猶云恐也賦動也賦斂所以擾動民也􅦤極也巨畏反江東呼極爲􅦤倦聲之轉也煎盡也爽過也謂過差也蟬毒也慘㥢也音湭㥢惡也慘悴惡事也還積也宛蓄也謂宛樂也言婉類法也由式也猷詐也猶者言故爲詐䒰隨也揣試也揣度試之䫴怒也䫴䫴恚㒵也巨廩反埝下也謂䧟下也音坫肆讃解也讃訟所以解釋理物也賴取也扲業也謂基業也音鉗帶行也隨人行也漮空也漮窘空㒵康或作㱂虚字也湛安也湛然安㒵㗔樂也㗔㗔歡㒵音倇歡也歡樂也音婉衎定也衎然安定㒵也音看䑄􅶘也謂􅶘肉也魚自反讟痛也謗誣怨痛也亦音讀鼻始也嘼之初生謂之鼻人之􅀄生謂之首梁益之間謂鼻爲初或謂之祖祖居也鼻祖皆始之別名也轉復訓以爲居所謂代語者也兗養也翳掩也謂掩覆也􅄗支也純文也祐亂也亂宜訓治恌理也謂情理也音遥蕰晠也藴藹茂㒵搪張也謂榖張也音堂惲謀也謂議也嘔憤反陶養也㩒挌也今之竹木格是也音禁惡毗曉明也扱擭也扱猶級也扶護也扶挾將護淬寒也淬猶淨也作憒反漺凈也皆冷㒵也􅀄兩禁耕二反漉極也滲漉極盡也牧凡也易始也易代更始也逭周也謂周轉也䵱色也䵱然赤色㒵也音奭恬靜也恬惔安靜禔福也謂福祚也音祗禔喜也有福即喜攋洛旱反隓許挸反壞也息歸也抑安也潜亾也曉過也曉嬴也􅵌短也蹶􅵌短小㒵音剟音肬贅隑剴切陭也江南人呼梯爲隑所以隑物而登者也音剴切也迒長也謂長短也胡郎反迒迹也爾雅以爲兔迹賦臧也藴饒也音温媵託也適牾也相觸迕也捭予也予猶與音卑彌縫也譯傳也譯見也傳宣語即相見梗略也梗概大略也臆滿也愊臆氣滿之也䧞益也謂増益也音罵空待也來則實也珇好也珇美也美好等㸦見義耳音祖嫗色也嫗煦好色㒵閻開也謂􅀜門也靡滅也或作摩滅字音麋菲薄也謂微薄也音翡腆厚也媟狎也相親狎也芋大也芋猶訏耳香于反煬翕炙也今江東呼火熾猛爲煬音恙煬烈暴也馺馬馳也馺馺疾㒵也索荅反選延偏也澌索也盡也晞燥也梗覺也謂直也萃集也睨俾倪䁺音亦明也暟臨昭也暟美也暟暟美德也呼凱反箄方氏反簍音縷籅音餘䈱弓㢭􅞠也古筥字江􅃆之間謂之籅趙代之間謂之䈱淇衞之間謂之井筐淇水名也􅞠其通語也􅞠小者南楚謂之簍自􅀜而西秦晉之間謂之箄今江南亦名籠爲箄籠南楚江􅃆之間謂之篣今零陵人呼籠爲篣音彭或謂之笯音都墓亦呼籃􅞊盛餅筥也南楚謂之筲今建平人呼筲爲鞭鞘趙魏之郊謂之去􅞊今通語也錐謂之鍣廣雅作銘字無升謂之刁斗謂小鈴也音貂見漢書匕謂之匙盂謂之㯸子殄反河􆇔之間謂之䀂椀謂之盂謂之銚銳謡音木謂之㳙抉椀亦盂屬江東名盂爲凱亦曰甌也蠲玦兩音餌謂之餻或謂之粢或謂之音鈴或謂之餣央恡反或謂之䬧音元輶軒使者絶代語釋別國方言第十三
