body:
  text: 輶軒使者絶代語釋別國方言第一黨曉哲知也楚謂之黨黨朗也解寤㒵或曰曉齊宋之間謂之哲䖍儇慧也謂慧了音翾秦謂之謾言謾訑音􅑲大和反謾莫錢又亡山反晉謂之㦟音悝或莫佳反宋楚之間謂之倢言便倢也楚或謂之䜏他和反亦今通語自􅀜而東趙魏之間謂之􅃛或謂之􅀑言􅀑眎也娥㜲音盈好也秦曰娥言娥娥也宋魏之間謂之㜲言㜲㜲也秦晉之間凡好而輕者謂之娥自􅀜而東河濟之間謂之媌今􅀜西人亦呼好爲媌莫交反或謂之姣言姣潔也音狡趙魏燕代之間曰姝昌朱反音株亦四方通語或曰妦言妦容也音蜂自􅀜而西秦晉之故都曰妍秦舊都今扶風雍丘也晉舊都今太原晉陽縣也其俗通呼好爲妍五千反妍一作忓好其通語也烈枿餘也謂烈餘也五割反陳鄭之間曰枿晉衞之間曰烈秦晉之間曰􅀠音謚傳曰夏􅀠是屏或曰烈台胎陶鞠養也台猶頥也音怡晉衞燕魏曰台陳楚韓鄭之間曰鞠秦或曰陶汝潁梁宋之間曰胎或曰艾爾雅云艾養也憮亡輔反㤿音淹憐牟愛也韓鄭曰憮晉衞曰㤿㤿憸多意氣也汝潁之間曰憐宋魯之間曰牟或曰憐憐通語也㥄憮矝悼憐哀也㥄亦憐耳音陵齊魯之間曰矜陳楚之間曰悼趙魏燕代之間曰㥄自楚之北郊曰憮秦晉之間或曰矜或曰悼咺香逺反唏虚几反㣿音的一音灼怛痛也凡哀泣而不止曰咺哀而不泣曰唏於方則楚言哀曰唏燕之外鄙鄙邊邑名朝鮮洌水之間朝鮮今樂浪郡是也洌水在遼東音烈少兒泣而不止曰咺少兒猶言小兒自􅀜而西秦晉之間凡大人少兒泣而不止謂之唴丘尚反哭極音絶亦謂之唴平原謂啼極無聲謂之唴哴哴音亮今􅀜西語亦然楚謂之噭咷叫逃兩音字或作叴音求齊宋之間謂之喑音䕃或謂之惄奴歷反悼惄悴慭傷也詩曰不慭遺一老亦恨傷之言也慭魚􅈔反自􅀜而東汝潁陳楚之間通語也汝謂之惄秦謂之悼宋謂之悴楚潁之間謂之慭愼濟􅮃惄溼􅁊憂也􅮃者憂而不動也作念反宋衞或謂之愼或曰􅮃陳楚或曰溼或曰濟自􅀜而西秦晉之間或曰惄或曰溼自􅀜而西秦晉之間凡志而不得欲而不獲髙而有墜得而中亡謂之溼溼者失意潜沮之名沮一作阻或謂之惄鬰悠懷惄惟慮願念靖愼思也晉宋衞魯之間謂之鬰悠鬰悠猶鬰陶也惟凡思也慮謀思也願欲思也念常思也東齊海岱之間曰靖岱太山秦晉或曰愼凡思之貌亦曰愼謂感思者之容或曰惄敦豐厖鴟􅣽􅴨音介憮海狐反般般􅁊嘏音賈奕戎京奘在朗反將大也凡物之大貌曰豐厖深之大也東齊海岱之間曰􅴨或曰憮宋魯陳衞之間謂之嘏或曰戎秦晉之間凡物壯大謂之嘏或曰夏秦晉之間凡人之大謂之奘或謂之壯燕之北鄙齊楚之郊或曰京或曰將皆古今語也語聲轉耳初別國不相往來之言也今或同而舊書雅記故俗語不失其方皆本其言之所出也雅小雅也而後人不知故爲之作釋也釋詁釋言之屬假音駕􅛕古格字懷摧詹戾艐古届字至也邠唐冀兖之間曰假或曰􅛕邠今在始平漆縣唐今在太原晉陽縣齊楚之㑹郊兩境之間或曰懷摧詹戾楚語也詩曰先祖于摧六日不詹魯侯戾止之謂也此亦方國之語不專在楚也艐宋語也皆古雅之別語也雅謂風雅今則或同嫁逝徂適往也自家而出謂之嫁由女而出爲嫁也逝秦晉語也徂齊語也適宋魯語也往凡語也謾台蠻怡二音脅䦧呼隔反懼也燕代之間曰謾台齊楚之間曰脅䦧宋衞之間凡怒而噎噫噎謂憂也噫央媚反謂之脅䦧脅䦧猶䦧􅂖也南楚江湘之間謂之嘽咺湘水名今在零陵咺音香逺反䖍劉慘㨆殺也今關西人呼打爲㨆音廩或洛感反秦晉宋衞之間謂殺曰劉晉之北鄙亦曰劉秦晉之北鄙燕之北郊翟縣之郊謂賊爲䖍今上黨潞縣即古翟國晉魏河内之北謂㨆曰殘楚謂之貪南楚江湘之間謂之欺言欺㨆難猒也亟憐憮㤿愛也東齊海岱之間曰亟詐欺也自􅀜而西秦晉之間凡相敬愛謂之亟陳楚江淮之間曰憐宋衞邠陶之間曰憮或曰㤿陶唐晉都處眉棃耊鮐老也東齊曰眉言秀眉也燕代之北鄙曰棃言面色似凍棃宋衞兖豫之内曰耊八十爲耊音絰秦晉之郊陳兖之㑹曰耇鮐言背皮如鮐魚耇音垢脩駿融繹尋延長也陳楚之間曰脩海岱大野之間曰㝷大野今髙平鉅野宋衞荆呉之間曰融自􅀜而西秦晉梁益之間凡物長謂之㝷周官之法度廣爲㝷度謂絹帛撗廣幅廣爲充爾雅曰繙廣充幅延永長也凡施於年者謂之延施於衆長謂之永各隨事爲義允訦音諶恂音荀展諒音亮穆信也齊魯之間曰允燕代東齊曰訦宋衞汝潁之間曰恂荆呉淮汭之間曰展汭水口也音芮西甌毒屋黄石野之間曰穆西甌駱越別種也音嘔其餘㫮未詳所在衆信曰諒周南召南衞之語也碩沈巨濯訏敦夏于大也訏亦作芋音義同耳香于反齊宋之間曰巨曰碩凡物盛多謂之㓂今江東有小鳧其多無數俗謂之㓂也齊宋之郊楚魏之際曰夥音楇自􅀜而西秦晉之間凡人語而過謂之􅻦于果反或曰僉東齊謂之劒或謂之弩弩猶怒也陳鄭之間曰敦荆呉揚甌之郊曰濯中齊西楚之間曰訏西楚謂今汝南彭城自關而西秦晉之間凡物之壯大者而愛偉之謂之夏周鄭之間謂之暇音賈郴齊語也洛含反于通詞也牴觸牴也􅥚音致㑹也雍梁之間曰牴秦晉亦曰牴凡㑹物謂之􅥚華荂晠也荂亦蕐別名音誇齊楚之間或謂之華或謂之荂墳地大也青幽之間凡土而髙且大者謂之墳即大陵也張小使大謂之廓陳楚之間謂之摸音莫嬛蟬火全反䌪音剡撚諾典反未續也楚曰嬛嬋出也別異義楚曰蟬或曰未及也􅨬古蹋字他匣反䠛逍遥音拂跳也楚曰䟷勑厲反亦中州語陳鄭之間曰䠛楚曰蹠自􅀜而西秦晉之間曰跳或曰􅨬躡郅音質􅉥音企􅛕格亦訓來躋濟渡䠯踊躍登也自􅀜而西秦晉之間曰躡東齊海岱之間謂之躋魯衞曰郅梁益之間曰􅛕或曰􅉥逢逆迎也自􅀜而東曰逆自􅀜而西或曰迎或曰逢撏常含反攓音蹇摭盜蹠挻羊羶反取也南楚曰攓陳宋之間曰摭衞魯揚徐荆衡之郊曰撏衡衡山南岳名今在長沙自􅀜而西秦晉之間凡取物而逆謂之籑音饌楚部或謂之挻餥音非飵音昨食也陳楚之内相謁而食麥饘謂之餥饘糜也音旃楚曰飵凡陳楚之郊南楚之外相謁而飧晝飯爲飧謁請也或曰飵或曰䬯音黏秦晉之際河隂之間曰䭡惡恨反䭓五恨反今馮翊郃陽河東龍門是其處也此秦語也今􅀜西人呼食欲飽爲䭡䭓釗薄勉也相勸勉也居遼反秦晉曰釗或曰薄故其鄙語曰薄努猶勉努也如今人言努力也南楚之外曰薄努自􅀜而東周鄭之間曰勔釗沉湎齊魯曰勖兹勖勔亦訓勉也輶軒使者絶代語釋別國方言第一
