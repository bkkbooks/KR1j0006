body:
  text: 輶軒使者絶代語釋別國方言第十媱愓遊也江沅之間謂戲爲媱或謂之愓音羊或謂之嬉香其反曽訾何也湘潭之原潭水名出武陵音潭一曰滛荆之南鄙謂何爲曽或謂之訾今江東人語亦云訾爲聲如斯若中夏言何爲也央亡嚜杘嚜音目杘丑夷反姡胡刮反獪也江湘之間或謂之無賴或謂之㺒恐多智也恪交反凡小兒多詐而獪謂之央亡或謂之嚜杘嚜杘濳濳狡也或謂之姡言􅃛姡也姡娗也言恫娗也或謂之猾音滑皆通語也崽者子也崽音枲聲之轉也湘沅之㑹兩水合處也音獪凡言是子者謂之崽若東齊言子矣聲如宰誺不知也音癡􅅭江東曰咨此亦如聲之轉也沅澧之間澧水今在長沙音禮凡相問而不知荅曰誺使之而不肯荅曰吂音茫今中國語亦然粃不知也今淮楚間語呼聲如非也㷄火也呼隗反楚轉語也猶齊言􅛚火也音毁嘳無寫憐也皆之代語也音蒯沅澧之原凡言相憐哀謂之嘳或謂之無寫江濵謂之思濵水邊也皆相見驩喜有得亡之意也九嶷湘潭之間謂之人兮九嶷山名今在零陵營道縣婩魚踐反音筞鮮好也南楚之外通語也㘓哰闌牢二音謰謱上音連下力口反拏也言譇拏也奴加反東齊周晉之鄙曰㘓哰㘓哰亦通語也平原人好㘓哰也南楚曰謰謱或謂之支註支之䜴反註音注或謂之詀謕上託兼反下音啼轉語也拏揚州㑹稽之語也或謂之惹言情惹也汝邪反一音若或謂之䛳言誣䛳也亄􅞋貪也謂慳貪也音懿荆汝江湘之郊凡貪而不施謂之亄亦中國之通語或謂之􅞋或謂之悋悋恨也慳者多情恨也遥窕滛也九嶷荆郊之鄙謂􅁋曰遥言心遥蕩也沅湘之間謂之窕窈窕治容潛涵沉也楚郢以南曰涵音含或古南反或曰潛潛又遊也潛行水中亦爲游也􅜝安靜也江湘九嶷之郊謂之􅜝拌棄也音伴又普槃反楚凡揮棄物謂之拌或謂之敲恪校反今汝潁間語亦然或云撅也淮汝之間謂之伇江東又呼撅音黶又音犳音豹諑愬也諑譛亦通語也楚以南謂之諑戲泄歇也楚謂之戲音義泄奄息也楚揚謂之泄攓取也音騫一曰騫楚謂之攓昲曬乾物也揚楚通語也昲音非亦皆北方常語耳或云㬓䕁猝也謂倉卒也音斐江湘之間凡卒相見謂之䕁相見或曰突他骨反迹迹屑屑不安也皆往來之㒵也江沅之間謂之迹迹秦晉謂之屑屑或謂之塞塞或謂之省省不安之語也􅻳沐音䦧佂伀遑遽也江湘之間凡窘猝怖遽謂之􅻳沐喘􅊱㒵也或謂之佂伀翥舉也謂軒翥也楚謂之翥忸怩慙歰也歰猶苦者楚郢江湘之間謂之忸怩或謂之㗤咨子六莊伊二反垤封塲也楚郢以南蟻土謂之垤垤中齊語也讁過也謂罪過也音􅞾亦音適罪罰也南楚以南凡相非議人謂之讁或謂之衇血脉衇又慧也今名黯􅀑衇膊兄也此音義所未詳荆揚之鄙謂之膊桂林之中謂之吾駭反揚越之郊凡人相侮以爲無知謂之眲諾革反眲耳目不相信也因字名也或謂之斫斫郄斫頑直之㒵今􅀜西語亦皆然惃衮衣音㪍頓􅉖惽也謂迷昏也楚揚謂之惃或謂之江湘之間謂之頓􅉖頓􅉖猶頓悶也或謂之氐惆丁弟丁牢二反南楚飲毒藥懣謂之氐惆亦謂之頓􅉖猶中齊言眠眩也愁恚憒憒毒而不發謂之氐惆氐惆猶懊憹也恱舒蘇也謂蘇息也楚通語也眠娗莫典塗殄二反脉蜴音析賜施輕易茭媞恪挍得懈二反譠謾託蘭莫蘭二反㦒忚麗醯二音皆欺謾之語也楚郢以南東揚之郊通語也六者亦中國相輕易􅃖弄之言也􅷵頟顔顙也湘江之間謂之􅷵今建平人呼頟爲􅷵音旃裘中夏之謂頟東齊謂之顙汝潁淮泗之間謂之顔頷頥頜也謂頷車也南楚謂之頷亦今通語爾秦晉謂之頜頥其通語也紛怡喜也湘潭之間曰紛怡或曰巸巳嬉怡二音􅶛或也酒酣沅澧之間凡言或如此者曰􅶛如是亦此憨聲之轉耳愮療治也江湘郊㑹謂醫治之曰愮俗云厭愮病音曜愮又憂也博異義也或曰療芔凶位反莽嫫母反草也東越揚州之間曰芔南楚曰莽悈鰓悈音良愅鰓音魚鰓乾都音干耇音姤革老也皆老者皮色枯瘁之形也皆南楚江湘之間代語也凡以異語相易謂之代也㧙揰祕抌都感反亦音甚推也南楚凡相推搏曰㧙或曰㧾苦骨反沅湧􅻴幽之語􅻴水今在桂陽音扶涌水今在南郡華容縣也或曰攩今江東人亦名推爲攩音晃食閻音鹽慫慂上子竦反下音涌勸也南楚凡已不欲喜而旁人􅀃之不欲怒而旁人怒之謂之食閻或謂之慫涌欸音醫或音塵埃􅬢鳬鷖然也南楚凡言然者曰欸或曰􅬢緤末紀緒也南楚皆曰緤音薛或曰端或曰紀或曰末皆楚轉語也䁓音㧾􅷭音麗闚䀡勑纎反占伺視也凡相竊視南楚謂之闚或謂之䁓或謂之䀡或謂之占或謂之􅷭􅷭中夏語也亦言也闚其通語也自江而北謂之䀡或謂之覗凡相候謂之占占猶瞻也郺惡孔反􅳉奴動反晠多也南楚凡大而多謂之郺或謂之􅳉凡人語言過度及妄施行亦謂之􅳉抯柤􅀺樝以加反取也南楚之間凡取物溝泥中謂之柤或謂之樝􅚁音汎僄飄零輕也楚凡相輕薄謂之相􅚁或謂之僄也卷終
