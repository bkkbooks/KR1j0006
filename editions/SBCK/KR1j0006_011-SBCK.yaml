body:
  text: 輶軒使者絶代語釋別國方言第十一蛥蚗蛥音折蚗亐列反一音玦齊謂之螇螰奚鹿二音楚謂之蟪蛄莊子曰蟪蛄不知春秋也或謂之蛉蛄音零秦謂之蛥蚗自􅀜而東謂之虭蟧貂料二音或謂之蝭蟧音帝或謂之蜓蚞廷木二音西楚與秦通名也江東人呼蟂蟧蟬楚謂之蜩音調宋衞之間謂之螗蜩今胡蟬也似蟬而小鳴聲清亮江南呼螗蛦陳鄭之間謂之蜋蜩音良秦晉之間謂之蟬海岱之間謂之䗁齊人呼爲巨䗁音技其大者謂之蟧或謂之蝒馬按爾雅云蝒馬者蜩非別名蝒馬也此方言誤耳其小者謂之麥蚻如蟬而小青色今􅀜西呼麥蠽音之有文者謂之蜻蜻即蚻也爾雅云耳其䳄蜻謂之疋祖反一大而黒者謂之䗃音棧黒而赤者謂之蜺雲霓蜩蟧謂之􅫞蜩江東呼爲􅫞􅝺也􅣒謂之寒蜩寒蜩瘖蜩也按爾雅以蜺爲寒蜩月令亦曰寒蜩鳴知寒蜩非瘖者也此諸蟬名通出爾雅而多駮雜未可詳據也寒蜩螿也似小蟬而色青􅣒音應蛄詣謂之杜蛒音格螻螲謂之螻蛄音室塞或謂之蟓蛉象鈴二音南楚謂之杜狗或謂之蛞螻蜻蛚即趨織也精列二音楚謂之蟋蟀或謂之蛬梁園呼蛬音鞏南楚之間謂之蚟孫孫一作絲螳蜋謂之髦有斧蟲也江東呼爲石蜋又名齕肬或謂之虰按爾雅云螳蜋蛑奵義自應下屬方言依此􅀃失其指也或謂之䖹䖹姑䗐謂之強䖹米中小黒甲虫也江東名之􅧅音加建平人呼􅇗子音􅇗􅇗即姓也蟒即蝗也莫鯁反宋魏之間謂之蚮音貸南楚之外謂之蟅蟒蟅音近詐亦呼吒蝢或謂之蟒或謂之􅻭音滕蜻蛉謂之蝍蛉六足四翼虫也音靈江東名爲狐􅀺淮南人呼䗧􅢤䗧音康􅢤音伊舂􅁰謂之􅱁蝑􅱁音藂蝑音壞沮反又名蚣􅱁江東呼虴蛨蠀􅠸謂之蚇蠖即踧二音蠖烏郭反又呼歩屈􅑣燕趙之間謂之蠓螉蒙翁二音其小者謂之􅝡螉小細腰􅑣也音鯁噎或謂之蚴蛻幽恱二音其大而􅁡謂之壷蠭今黒􅑣穿竹木作孔亦有􅁡者或呼笛師蠅東􆆼謂之羊此亦語轉耳今江東人呼羊聲如蠅凡此之􅀋皆不宜別立名也陳楚之間謂之蠅自􅀜而西秦晉之間謂之蠅蚍蜉毗浮二音亦呼蟞蜉齊魯之間謂之蚼蟓駒養二音西南梁益之間謂之玄蚼法言曰􅀇駒之歩是燕謂之蛾䖹蟻養一音建平人呼蚳音侈其塲謂之坻直尸反或謂之蛭亦言冡也蠀螬謂之蟦翡翠反自􅀜而東謂之蝤蠀猶餈兩音或謂之䖭蠾書卷或謂之蝖􅕪亦呼當齊或呼虵或呼蟦蝖喧斛兩音梁益之間謂之蛒音格或謂之蝎或謂之蛭蛒音質秦晉之間謂之蠧或謂之天螻按爾雅云􅕪天螻謂螻蛄耳而方言以爲蝎未詳其義也四方異語而通者也蚰􅣓由延二音自􅀜而東謂之螾􅣓音引或謂之入耳或謂之䗅􅫡音麗趙魏之間或謂之蚨虶扶于二音北燕謂之䖡蚭䖡奴六反蚭音尼江東又呼蛩音鞏鼅鼄知株二音鼄蝥也音無自􅀜而西秦晉之間謂之鼄蝥今江東呼蝃蝥音掇自􅀜而東趙魏之郊謂之鼅鼄或謂之蠾蝓燭􅁷二音蠾蝓者侏儒語之轉也北燕朝鮮洌水之間謂之蝳蜍齊人又呼社公亦言周公音毒餘蜉䖻浮由二音秦晉之間謂之蟝􅶗似天牛而小有甲角出糞土中朝生夕死馬蚿音弦北燕謂之蛆蟝蝍蛆其大者謂之馬蚰音逐今􅀜西云輶軒使者絶代語釋別國方言第十一
