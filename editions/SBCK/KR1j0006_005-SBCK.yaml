body:
  text: 輶軒使者絶代語釋別國方言第五鍑釡屬也音富北燕朝鮮洌水之間或謂之錪音腆或謂之鉼音餅江淮陳楚之間謂之錡或曰三脚釡也音技或謂之鏤呉揚之間謂之鬲音曆釡自􅀜而西或謂之釡或謂之鍑鍑亦釡之揔名甑自􅀜而東謂之甗音言或謂之􅑄音岑梁州呼鉹或謂之酢餾屋霤盂音亐宋楚魏之間或謂之盌烏管反盌謂之盂或謂之銚銳謡語盌謂之櫂盂謂之柯轉相釋者廣異語也海岱東齊北燕之間或謂之􅿧書卷㿿音雅椷封緘盞酒醆䀀薄淹反閜呼雅反􅦝音章􅡸音摩桮也秦晉之郊謂之㿿所謂伯㿿者也自􅀜而東趙魏之間曰椷或曰盞最小桮也或曰䀀其大者謂之閜呉越之間曰􅦝齊右平原以東或謂之􅡸桮其通語也㼖瓠勺也音麗陳楚宋魏之間或謂之簞或謂之􅪚今江東通呼勺爲􅪚音羲或謂之瓢案陳楚宋魏之間謂之自􅀜東西謂之案桮􅿎盛桮器籠也陳楚宋衞之間謂之桮􅿎又謂之豆筥自􅀜東西謂之桮􅿎箸筩盛朼箸也陳楚宋魏之間謂之筲鞭鞘或謂之籝漢書曰遺子黄金滿籝音盈也自􅀜而西謂之桶檧今俗亦通呼小籠爲桶檧音籠冠檧蘇勇反或作筩㼚音岡瓭都感反亦音沉音舞䍃音由㽀音鄭㼻胙江反甀度睡反瓮瓿甊瓿音部甊洛口反㽈牛志反甖於庚反靈桂之郊謂之㼚今江東通名大瓮爲㼚其小者謂之瓭周魏之間謂之今江東亦呼甖爲子秦之舊都謂之㽀淮汝之間謂之䍃江湘之間謂之㼻自􅀜而西晉之舊都河汾之間汾水出大原經絳北西南入河其大者謂之甀其中者謂之瓿甊自􅀜而東趙魏之郊謂之瓮或謂之甖東齊海岱之間謂之㽈甖其通語也罃陳魏宋楚之間曰㼶音􅁷或曰㼡音殊燕之東北朝鮮洌水之間謂之瓺音暢亦膓齊之東北海岱之間謂之儋所謂家無儋石之餘曲音擔字或作甔周洛韓鄭之間謂之甀或謂之罃罃謂之㼰鼔鼙􅽧謂之㽄缶謂之瓿㼴即盆也音偶其小者謂之瓶罃甈謂之盎案爾雅甈康壺而方言以爲盆未詳也甈郄罽反盎烏浪反自􅀜而西或謂之盆或謂之盎其小者謂之􅂛甌惡牟反亦音憂甂音邊陳魏宋楚之間謂之㼵今河北人呼小盆爲㼵子杜啓反自􅀜而西謂之甂其大者謂之甌所以注斛盛米穀寫斛中者也陳魏宋楚之間謂之䈪今江東亦呼爲䈪音巫覡自􅀜而西謂之注箕陳魏宋楚之間謂之籮䈪亦籮屬也形小而髙無耳炊䉛謂之縮漉米䉛也或謂之音藪或謂之㔯音旋江東呼浙籖篝今薫籠也陳楚宋魏之間謂之牆居扇自􅀜而東謂之箑今江東亦通名扇爲箑音䈉自􅀜而西謂之扇碓機碓梢也陳魏宋楚自􅀜而東謂之梴音延磑或謂之䃀即磨也錯碓反繘汲水索也音橘自􅀜而東周洛韓魏之間謂之綆或謂之絡音洛􅀜西謂之繘綆櫪養馬器也梁宋齊楚北燕之間或謂之樎音縮或謂之皁皁隷之名於此乎出飲馬橐自􅀜而西謂之裺囊音䳺或謂之裺篼或謂之㡞篼音樓燕齊之間謂之帪廣雅作振字音同耳鉤懸昒者宋楚陳魏之間謂之鹿觡或呼鹿角或謂之鉤格自􅀜而西謂之鉤或謂之䥩音微臿燕之東北朝鮮洌水之間謂之􅝁湯料反此亦鍫聲轉也宋魏之間謂之鏵或謂之鍏音韋江淮南楚之間謂之臿沅湘之間謂之畚趙魏之間謂之喿字亦作鍫也東齊謂之梩音駭江東又呼鍫刃爲鐅普蔑反􅂎無齒爲朳宋魏之間謂之渠挐今江東名亦然諾猪反或謂之渠䟽語轉也僉令連架所以打榖者宋魏之間謂之攝殳音殊亦杖名也或謂之度今江東呼打爲度音量度也自􅀜而西謂之棓蒲項反或謂之拂音拂齊楚江淮之間謂之柍音悵怏亦音爲車鞅此皆打之別名也或謂之桲音勃刈鈎江淮陳楚之間謂之鉊音召或謂之鐹音果自􅀜而西或謂之鈎戓謂之鎌或謂之鍥音結薄宋魏陳楚江淮之間謂之䒼或謂之麴此直語楚聲轉也自􅀜而西謂之薄南楚謂之蓬薄橛燕之東北朝鮮洌水之間謂之椵揭杙也江東呼都音叚槌絲蠶薄柱也度畏反宋魏陳楚江淮之間謂之植音值自􅀜而西謂之槌齊謂之样音陽其横􅀜西曰㮳音朕亦名校音交宋魏陳楚江淮之間謂之㯂音帶齊部謂之㭙丁謹反胡以縣㯂􅀜西謂之䌞力冉反東齊海岱之間謂之相主反宋魏陳楚江淮之間謂之繯擐甲或謂之環檈簟宋魏之間謂之笙今江東通言笙或謂之籧䒼自􅀜而西謂之簟或謂之䓆今云䓆篾篷也其粗者謂之籧篨自􅀜而東或謂之篕掞音剡江東呼籧篨爲䉬音廢筕篖似籧篨直文而粗江東呼笡音自􅀜而東周洛楚魏之間謂之􅀝佯音羊自􅀜而西謂之筕篖南楚之外謂之篖牀齊魯之間謂之簀床版也音迮陳楚之間或謂之笫音滓又音姊其杠北燕朝鮮之間謂之樹自􅀜而西秦晉之間謂之杠南楚之間謂之趙趙當作兆聲之轉也中國亦呼杠爲桃牀皆通也東齊海岱之間謂之樺音先其上板衞之北郊趙魏之間謂之牒簡牒或曰牑履屬俎几也西南蜀漢之郊曰杫音賜榻前几江沔之間曰桯今江東呼爲承桯音刑趙魏之間謂之椸音易凡其髙者謂之虡即筍虡也音巨篗榬也所以絡絲也音爰兖豫河濟之間謂之榬絡謂之格所以轉篗給車也繀車蘇對反趙魏之間謂之轣轆車東齊海岱之間謂之道䡄戸鑰自􅀜之東陳楚之間謂之鍵巨蹇反自􅀜之西謂之鑰簙謂之蔽或謂之箘音囷秦晉之間謂之簙呉楚之間或謂之蔽或謂之箭裏簿著名箭廣雅云或謂之簙毒或謂之夗專夗於辯反專音轉或謂之璇或曰竹器所以整頓簿者銓旋兩音或謂之棊所以投簙謂之枰評論或謂之廣平所以行棊謂之􅈰或謂之曲道圍棊謂之弈自􅀜而東齊魯之間皆謂之弈輶軒使者絶代語釋別國方言第五
