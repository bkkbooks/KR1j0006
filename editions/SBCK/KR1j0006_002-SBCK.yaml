body:
  text: 輶軒使者絶代語釋別國方言第二釥錯眇反嫽洛夭反好也青徐海岱之間曰釥或謂之嫽今通呼小姣㓗喜好者爲嫽釥好凡通語也朦忙紅反厖䲭􅣽豐也自􅀜而西秦晉之間凡大貌謂之朦或謂之厖豐其通語也趙魏之郊燕之北鄙凡大人謂之豐人燕記曰豐人杼首杼首長首也楚謂之伃音序燕謂之杼燕趙之間言圍大謂之豐謂度圍物也娃烏佳反嫷諾過反窕途了反豔美也吳楚衡淮之間曰娃南楚之外曰嫷言婑嫷也宋衞晉鄭之間曰豔陳楚周南之間曰窕自􅀜而西秦晉之間凡美色或謂之好或謂之窕故吳有館娃之宫秦有㯃娥之臺皆戰國時諸侯所立也㯃音七秦晉之間美貌謂之娥言娥娥也美狀爲窕言閑都也美色爲豔言光豔也美心爲窈言幽静也奕偞容也自􅀜而西凡美容謂之奕或謂之偞奕偞皆輕麗之㒵偞音葉宋衞曰偞陳楚汝潁之間謂之奕䫵音綿下作􅗻音字同耳鑠舒灼反􅶀香于反揚音滕􅃗也南楚江淮之間曰䫵或曰好目謂之順言流澤也黸黸黒也瞳之子謂之􅗻言􅗻邈也宋衞韓鄭之間曰鑠言光明也燕代朝鮮洌水之間曰盱謂舉眼也或謂之揚詩曰美目揚􅀆是也此本論􅃗耦因廣其訓復言目耳魏􅆧箠反笙揫音遒摻素檻反細也自􅀜而西秦晉私䇿纎䓲音銳稺古稚字杪莫召反小也自􅀜而西秦晉之郊梁益之間凡物小者謂之私小或曰纎繒帛之細者謂之纎東齊言布帛之細者曰綾音凌秦晉曰靡靡細好也凡草生而初達謂之䓲鋒萌始出稺年小也木細枝謂之杪言杪梢也江淮陳楚之内謂之篾篾小㒵也青齊兖冀之間謂之葼馬􅷔燕之北鄙朝鮮洌水之間謂之䇿故傳曰慈母之怒子也雖折葼笞之其惠存焉言敎在其中也殗於怯反殜音葉微也宋衞之間曰殗自􅀜而西秦晉之間凡病而不甚曰殗殜病半臥半起也􅄗敵延一作迮也東齊海岱之間曰􅄗自􅀜而西秦晉之間物力同者謂之􅄗敵抱㛯追萬反一作嬎耦也耦亦迮㸦見其義耳音赴荆呉江湖之間曰抱㛯宋潁之間或曰㛯􅀝丘􅀉反踦郄竒反竒也竒偶自􅀜而西秦晉之間凡全物而體不具謂之􅀝梁楚之間謂之踦雍梁之西郊凡嘼支體不具者謂之踦逴勑略反獡音鑠透式六反驚也自􅀜而西秦晉之間凡蹇者或謂之逴行略逴也體而偏長短亦謂之逴宋衞南楚凡相驚曰獡或曰透皆驚㒵也儀􅛕來也陳潁之間曰儀自􅀜而東周鄭之郊齊魯之間或謂􅛕曰懷䵑暗􅭓音汝黏也齊魯青徐自􅀜而東或曰䵑言黏䵑也或曰􅭓餬音胡䚽庇庇䕃寓􅯔音孕􅀉也齊衞宋魯陳晉汝潁荆州江淮之間曰庇或曰寓􅀉食爲餬傳曰餬予口於四方是也凡􅀉爲託􅀉物爲􅯔逞苦了快也自山而東或曰逞楚曰苦苦而爲快者猶以臭爲香治爲亂但爲存此訓義之反覆用之是也秦曰了今江東人呼快爲愃相縁反挴㥾􅎼愧也晉曰挴或曰㥾秦晉之間凡愧而見上謂之􅎼小雅曰面赤愧曰􅎼梁宋曰㥾勑㥾亦慙㒵也音匿叨託髙反惏洛含反殘也陳楚曰惏慿苛怒也楚曰慿慿恚盛㒵楚詞曰康回憑怒小怒曰言噤也陳謂之苛相苛責也憡刺痛也憡小痛也音策自􅀜而西秦晉之間或曰憡撟捎選也此妙擇積聚者也矯騷兩音自􅀜而西秦晉之間凡取物之上謂之撟捎􅏌呼早反梗魚鯁爽猛也晉魏之間曰􅏌傳曰􅏌然登埤韓趙之間曰梗齊晉曰爽瞷音閑睇音悌睎䀩音略眄也陳楚之間南楚之外曰睇東齊青徐之間曰睎呉揚江淮之間或曰瞷或曰䀩自關而西秦晉之間曰眄䭒消息喙口喙呬許四反息也周鄭宋沛之間曰䭒自􅀜而西秦晉之間或曰喙或曰䭒東齊曰呬䤨劈歷摫音䂓裁也梁益之間裁木爲器曰䤨裂帛爲衣曰摫䤨又斲也皆折破之名也晉趙之間謂之䤨䤨鐫㧻也謂鏨鐫也子旋反晉趙謂之鐫鍇音揩鑙音啟堅也自􅀜而西秦晉之間曰鍇呉揚江淮之間曰鑙揄鋪音敷􅯋音藍􅰸帗音拂縷葉輸音􅁷毳也音脆皆謂物之行蔽也荆揚江湖之間曰揄鋪楚曰􅯋􅰸陳宋鄭衞之間謂之帗縷燕之北郊朝鮮洌水之間曰葉輸今名短度綃爲輸也孑藎餘也謂遺餘昨吝反周鄭之間曰藎或曰孑青徐楚之間曰孑自􅀜而西秦晉之間炊薪不盡曰藎孑俊也遵俊也廣異語耳翿音濤幢徒江反翳也儛者所以自蔽翳也楚曰翿􅀜西􅀜東皆曰幢􅊧略求也秦晉之間曰􅊧就室曰􅊧於道曰略略強取也攗古捃字摭盜蹠取也此通語也茫矜奄遽也謂遽矜也呉揚曰茫今北方通然也莫光反陳潁之間曰奄秦晉或曰矜或曰遽速逞摇扇疾也東齊海岱之間曰速燕之外鄙朝鮮洌水之間曰摇扇楚曰逞予賴讎也南楚之外曰賴賴亦惡名秦晉曰讎􅁪􅁣蔘索含反綏羞繹音弈紛母言旣廣又大也荆揚之間凡言廣大者謂之􅁪􅁣東甌之間謂之蔘綏東甌亦越地今臨海永寧是也或謂之羞繹紛母劋雀潦反又子了反蹶音厥獪也古狡㹟字秦晉之間曰獪楚謂之劋或曰蹶言踣蹶也楚鄭曰蔿音指撝亦或聲之轉也或曰姡言􅃛姡也今建平郡人呼姣爲姡胡刮反輶軒使者絶代語釋別國方言第二
