body:
  text: 輶軒使者絶代語釋別國方言第三陳楚之間凡人嘼乳而雙産謂之􅁵孳音兹秦晉之間謂之僆子音輦自􅀜而東趙魏之間謂之孿生蘇官反女謂之嫁子言往適人東齊之間􅡾謂之倩言可借倩也今俗呼女􅡾爲卒便是也卒便一作平使燕齊之間養馬者謂之娠今之温厚也音振官婢女廝謂之娠女廝婦人給使者亦名娠楚東海之間亭父謂之亭公亭民卒謂之弩父主擔幔弩導幨因名云或謂之褚言衣赤也褚音赭臧甬音勇侮獲奴婢賤稱也荆淮海岱雜齊之間俗不純爲雜罵奴曰臧罵婢曰獲齊之北鄙燕之北郊凡民男而􅡾婢謂之臧女而婦奴謂之獲亡奴謂之臧亡婢謂之獲皆異方罵奴婢之醜稱也自􅀜而東陳魏宋楚之間保庸謂之甬保言可保信也秦晉之間罵奴婢曰侮言爲人所輕弄蔿音花譌訛言譁五􅀲反皆化聲之轉也􅄺化也燕朝鮮洌水之間曰􅄺或曰譁雞伏􅆑而未孚音赴始化之時謂之􅄺斟協汁也謂和協也或曰潘汁所未能詳北燕朝鮮洌水之間曰斟自􅀜而東曰協􅀜西曰汁蘓芥草也漢書曰樵蘓而爨蘓猶蘆語轉也江淮南楚之間曰蘓自􅀜而西或曰草或曰芥或言菜也南楚江湘之間謂之芥嫫母蘓亦荏也荏屬也爾雅曰蘓桂荏也􅀜之東西或謂之蘓或謂之荏周鄭之間謂之公蕡音翡翠今江東人呼荏爲䓊音魚沅湘之南或謂之今長沙人呼野蘓爲音車轄沅水名在武陵其小者謂之䖆葇堇葇也亦蘓之種􅀋因名云蘴舊音蜂今江東音嵩字作菘也蕘鈴鐃蕪菁也陳楚之郊謂之蘴魯齊之郊謂之蕘􅀜之東西謂之蕪菁趙魏之郊謂之大芥其小者謂之辛芥或謂之幽芥其紫華者謂之蘆菔今江東名爲温菘實如小豆羅匐二音東魯謂之菈􅫘洛荅大合兩反葰芡音儉雞頭也北燕謂之葰今江東亦呼葰耳青徐淮泗之間謂之芡南楚江湘之間謂之雞頭或謂之鴈頭或謂之烏頭狀似烏頭故傳以名之凡草木刺人北燕朝鮮之間謂之茦爾雅曰茦刺也或謂之壯今淮南人亦呼壯壯傷也山海經謂刺爲傷也自􅀜而東或謂之梗今云梗榆或謂之劌劌者傷割人名音鱥魚也自􅀜而西謂之刺江湘之間謂之􅁄楚詞曰曾枝剡􅁄亦通語耳音巳力反凡飲藥傅藥而毒南楚之外謂之瘌乖瘌北燕朝鮮之間謂之癆癆瘌皆辛螫也音聊東齊海岱之間謂之眠或謂之眩眠眩亦今通語耳自􅀜而西謂之毒瘌痛也逞曉恔苦快也快即狡狡戲亦快事也自􅀜而東或曰曉或曰逞江淮陳楚之間曰逞宋鄭周洛韓魏之間曰苦東齊海岱之間曰恔自􅀜而西曰快膠譎詐也涼州西南之間曰膠自􅀜而東西或曰譎或曰膠汝南人呼欺爲讉訰回反亦曰詒音殆詐通語也揠擢拂戎拔也今呼拔草心爲揠烏拔反自􅀜而西或曰抜或曰擢自􅀜而東江淮南楚之間或曰戎東齊海岱之間曰揠慰廛度凥也周官云夫一廛宅也音纏約江淮青徐之間曰慰東齊海岱之間或曰度或曰廛或曰踐萃雜集也東齊曰聖迨遝及也東齊曰迨音殆􅀜之東西曰遝或曰及荄杜根也今俗名韭根爲荄音陔東齊曰杜詩曰徹彼桑杜是也或曰茇音撥班徹列也北燕曰班東齊曰徹瘼音莫癁病也謂勞復也東齊海岱之間瘼或曰癁秦曰瘎音閻或湛掩醜掍衮衣綷作憒反同也江淮南楚之間曰掩宋衞之間曰綷或曰掍東齊曰醜裕猷道也東齊曰裕或曰猷䖍散殺也東齊曰散青徐淮楚之間曰䖍氾音汎浼音漫㶄湯㶄洼烏蛙反洿也皆洿池也自􅀜而東或曰洼或曰氾東齊海岱之間或曰浼或曰㶄荆州呼潢也庸恣比比次侹侹直更佚蹉跌代也齊曰佚江淮陳楚之間曰侹餘四方之通語也今俗亦名更代作爲恣作也廋隱也謂隱匿也音捜索也銛取也謂挑取物音忝棖隨也棖柱令相隨也儓音臺􅤵音􅈎農夫之醜稱也南楚凡罵庸賤謂之田儓㑣儓駑鈍㒵或曰僕臣儓亦至賤之號也或謂之􅤵􅤵丁㒓㒵也廣雅以爲奴字作僰音同或謂之辟辟商人醜稱也僻僻便􅃛㒵也音擘庸謂之倯轉語也倯猶保倯也今隴右人名孏爲倯相容反䄛裂須捷挾斯敗也南楚凡人貧衣被醜弊謂之須捷須捷狎翣也或謂之䄛裂裂衣壞㒵音縷或謂之襤褸故左傳曰蓽路襤褸以启山林蓽路柴車殆謂此也或謂之挾斯挾斯猶挾變也器物弊亦謂之挾斯􅡼打􅡼鋌音挺澌盡也南楚凡物盡生者曰􅡼生今種物皆生云􅡼地生也物空盡者曰鋌鋌賜也亦中國之通語也連此􅡼斯㫮盡也鋌空也語之轉也􅡼翕葉聚也􅡼屬藂相着㒵楚謂之􅡼或謂之翕葉楚通語也斟益也言斟酌益之南楚凡相益而又少謂之不斟凡病少愈而加劇亦謂之不斟或謂之何斟言雖小損無所益也差間知愈也南楚病愈者謂之差或謂之間言有間隟或謂之知知通語也或謂之慧或謂之憭慧憭皆意精明或謂之瘳或謂之蠲蠲亦除也音㳙一圭反
